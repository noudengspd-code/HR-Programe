function viewDoc(id){ state.doc=id; state.docEdit=false; closeDrawer(); hidePop(); closeEmp(); renderShell(); }

function downloadDoc(id){
  const rec = SAVED.find(d=>d.id===id); if(!rec) return;
  const css = document.querySelector('style').textContent;
  const html = `<!DOCTYPE html><html lang="lo"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${rec.docType} ${rec.docNo}</title><style>${css}</style></head><body style="background:var(--paper);padding:24px 14px"><div style="max-width:840px;margin:0 auto">${buildDocHTML(rec)}</div></body></html>`;
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=(rec.docNo||'document').replace(/[^\w\-]+/g,'_')+'.html';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast('ດາວໂຫລດເອກະສານ '+rec.docNo, true);
}

function wirePhoto(){
  const inp=$('#ct-photo'), prev=$('#ct-photo-prev'); if(!inp||!prev) return;
  inp.addEventListener('change', e=>{
    const f=e.target.files && e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{ const src=String(ev.target.result); if(src.length>700000) toast('ຮູບໃຫຍ່ — ແນະນຳໃຊ້ລິ້ງ Google Drive ເພື່ອກັນຂໍ້ມູນເຕັມ', false); const cu=$('#ct-photo-url'); if(cu) cu.value=''; prev.innerHTML=`<img src="${escapeHtml(src)}" alt="ຮູບຖ່າຍ">`; };
    r.readAsDataURL(f);
  });
}

/* ---- capture the live form into a saved official document ---- */
function cleanLabel(lab){ const c=lab.cloneNode(true); c.querySelectorAll('.help,.req').forEach(x=>x.remove()); return c.textContent.replace(/\s+/g,' ').trim(); }
function fieldValue(field){
  const sel=field.querySelector('select'); if(sel) return sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : '';
  const ta=field.querySelector('textarea'); if(ta) return ta.value.trim();
  if(field.querySelector('input[type=file]')) return null;
  const inp=field.querySelector('input'); if(!inp) return '';
  if(inp.type==='date') return inp.value ? inp.value.split('-').reverse().join('/') : '';
  return inp.value.trim();
}
function validateForm(doc){
  for(const f of [...doc.querySelectorAll('.field')]){ if(!f.querySelector('.req')) continue; const c=f.querySelector('input,select,textarea'); if(!c||c.type==='file') continue; if(!String(c.value||'').trim()){ const lab=f.querySelector('label'); return 'ກະລຸນາໃສ່ຂໍ້ມູນຊ່ອງ: '+(lab?cleanLabel(lab):'ທີ່ຈຳເປັນ'); } }
  for(const n of [...doc.querySelectorAll('input[type=number]')]){ if(n.value!=='' && Number(n.value)<0) return 'ຄ່າຕົວເລກຕ້ອງບໍ່ຕິດລົບ'; }
  const dates=[...doc.querySelectorAll('input[type=date]')].filter(d=>d.value);
  if(dates.length>=2 && dates[dates.length-1].value < dates[0].value) return 'ວັນທີສິ້ນສຸດ ຕ້ອງບໍ່ກ່ອນວັນທີເລີ່ມ';
  return null;
}
function saveFormDoc(moduleKey){
  const doc = document.querySelector('.doc');
  if(!doc){ toast('ບໍ່ພົບແບບຟອມ', false); return; }
  const verr=validateForm(doc); if(verr){ toast(verr, false); return; }
  const sections=[];
  doc.querySelectorAll('.fieldset').forEach(fs=>{
    const tEl=fs.querySelector('.fs-title');
    const title = tEl ? tEl.textContent.replace(/^\s*\d+\s*/,'').trim() : 'ຂໍ້ມູນ';
    const rows=[];
    fs.querySelectorAll('.field').forEach(f=>{
      const lab=f.querySelector('label'); if(!lab) return;
      if(f.querySelector('[data-review],[data-duty-idx]')) return;
      const v=fieldValue(f); if(v===null) return;
      rows.push([cleanLabel(lab), v]);
    });
    if(rows.length) sections.push({title, rows});
  });
  const dnodes=doc.querySelectorAll('[data-duty-idx]');
  if(dnodes.length){ dnodes.forEach(n=>{ const i=Number(n.dataset.dutyIdx); if(dutyOutline[i]!=null) dutyOutline[i].text=n.value; });
    const drows=dutyNumbering().filter(it=>it.text&&it.text.trim()).map(it=>[it.lvl, it.pf, it.text]);
    if(drows.length) sections.push({title:'ສິດ ແລະ ໜ້າທີ່ (ໂຄງສ້າງ)', kind:'duties', rows:drows}); }
  const calc=[];
  doc.querySelectorAll('.calc-cell').forEach(c=>{ const l=c.querySelector('.cl'), v=c.querySelector('.cv'); if(l&&v) calc.push([l.textContent.trim(), v.textContent.trim()]); });
  let outcome=null; const rd=doc.querySelector('input[type=radio]:checked');
  if(rd){ const lab=rd.closest('label'); outcome=lab?lab.textContent.trim():rd.value; }
  let photo=null; const pimg=doc.querySelector('#ct-photo-prev img'); if(pimg) photo=pimg.getAttribute('src');
  const dnEl=doc.querySelector('.docno'); const docNum = dnEl ? dnEl.textContent.replace('ເລກທີ:','').trim() : ('DOC-'+(++DOC_SEQ));
  const tiEl=doc.querySelector('.doc-title h2'); const docType = tiEl ? tiEl.textContent.trim() : ((modByKey(moduleKey)||{}).label||'ເອກະສານ');
  const signs=[...doc.querySelectorAll('.sign .role')].map(el=>({role:el.textContent.trim()}));
  let name=''; const nm=doc.querySelector('#ct-name'); if(nm&&nm.value.trim()) name=nm.value.trim();
  if(!name){ const fields=[...doc.querySelectorAll('.field')];
    for(const f of fields){ const inp=f.querySelector('input[type=text]'); if(inp&&inp.value.trim()){ name=inp.value.trim(); break; } }
    if(!name){ for(const f of fields){ const sel=f.querySelector('select'); if(sel){ const t=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].text:''; if(t){ name=t; break; } } } }
  }
  if(!name) name=docType;
  const empSel=doc.querySelector('[data-emp-select]'); let empId=null;
  if(empSel && empSel.value){ empId = empById(empSel.value) ? empSel.value : ((empByName(empSel.value)||{}).id||null); }
  if(!empId){ const e=empByName(name); if(e) empId=e.id; }
  if(empId){ const e=empById(empId); if(e) name=e.name; }
  const review={ name:'', pos:'', note:'' };
  const rvn=doc.querySelector('[data-review="name"]'); if(rvn) review.name=rvn.value.trim();
  const rvp=doc.querySelector('[data-review="pos"]'); if(rvp) review.pos=rvp.value.trim();
  const rvt=doc.querySelector('[data-review="note"]'); if(rvt) review.note=rvt.value.trim();
  const month=(new Date(today())).toISOString().slice(0,7);
  const rec={ id:'D'+(++DOC_SEQ), module:moduleKey, docNo:docNum, docType, date:today(), month, name, empId,
    status:'ບັນທຶກແລ້ວ', sections, calc, outcome, photo, review, signs:signs.length?signs:undefined, stamp:null, archived:true };
  SAVED.push(rec);
  Store.save(rec);
  toast('ບັນທຶກເຂົ້າຄັງເອກະສານສຳເລັດ · '+docNum, true);
  viewDoc(rec.id);
}

/* ============================================================
   v3 — STAFF DIRECTORY · PROFILES · IDENTITY · CONTRACT TRACKING
   ============================================================ */
const DEPTS = ['ບໍລິຫານ & ບຸກຄະລາກອນ','ບັນຊີ','ການເງິນ','ໂປຣແກຣມ (IT)','ການຕະຫຼາດ'];
const LEVELS = {1:'ຫົວໜ້າພະແນກ',2:'ຮອງຫົວໜ້າພະແນກ',3:'ພະນັກງານອາວຸໂສ',4:'ພະນັກງານ',5:'ນັກສຶກສາຝຶກງານ'};
const staffFilter = { dept:'all', q:'' };

function empById(id){ return DB.employees.find(e=>e.id===id); }
function empByName(nm){ if(!nm) return null;
  return DB.employees.find(e=>e.name===nm) || DB.employees.find(e=>nm.indexOf(e.name)>=0 || e.name.indexOf(nm)>=0); }
function ageFrom(dob){ if(!dob) return ''; const b=new Date(dob), n=new Date(today()); if(isNaN(b)) return '';
  let a=n.getFullYear()-b.getFullYear(); const m=n.getMonth()-b.getMonth(); if(m<0||(m===0&&n.getDate()<b.getDate())) a--; return a; }
function monthsBetween(a,b){ const d1=new Date(a), d2=new Date(b); if(isNaN(d1)||isNaN(d2)) return 0;
  let m=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth()); if(d2.getDate()<d1.getDate()) m--; return Math.max(0,m); }
function daysUntil(d){ const t=new Date(today()), e=new Date(d); if(isNaN(e)) return null; return Math.round((e-t)/86400000); }
function contractStatus(start,end){
  const elapsed = monthsBetween(start, today());
  const elapsedTxt = elapsed>=12 ? (Math.floor(elapsed/12)+' ປີ '+(elapsed%12)+' ເດືອນ') : (elapsed+' ເດືອນ');
  if(!end || end==='—'){ return {state:'open', label:'ສັນຍາບໍ່ມີກຳນົດ', badge:'<span class="badge b-success">ບໍ່ມີກຳນົດ</span>', elapsed, elapsedTxt, remainDays:null, remainTxt:'—'}; }
  const rd = daysUntil(end);
  if(rd<0)  return {state:'expired',  label:'ໝົດອາຍຸແລ້ວ', badge:'<span class="badge b-danger">ໝົດອາຍຸ</span>', elapsed, elapsedTxt, remainDays:rd, remainTxt:'ກາຍກຳນົດ '+Math.abs(rd)+' ມື້'};
  if(rd<=30) return {state:'expiring', label:'ໃກ້ໝົດອາຍຸ', badge:'<span class="badge b-warn">ໃກ້ໝົດ ('+rd+' ມື້)</span>', elapsed, elapsedTxt, remainDays:rd, remainTxt:'ເຫຼືອ '+rd+' ມື້'};
  return {state:'active', label:'ກຳລັງໃຊ້ງານ', badge:'<span class="badge b-info">ກຳລັງໃຊ້ງານ</span>', elapsed, elapsedTxt, remainDays:rd, remainTxt:'ເຫຼືອ '+rd+' ມື້'};
}

function initials(name){ const s=(name||'').replace(/^(ທ\.|ນ\.|ນາງ|ທ້າວ)\s*/,'').trim().split(/\s+/); return (((s[0]&&s[0][0])||'')+((s[1]&&s[1][0])||'')) || '•'; }
function avatar(e,size){ size=size||72; return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" class="ava-svg"><rect width="100" height="100" rx="50" fill="${e.color||'#1F6F66'}"/><text x="50" y="50" dy="0.36em" text-anchor="middle" font-size="36" fill="#fff" font-weight="700">${initials(e.name)}</text></svg>`; }
function qrImg(text,size){ size=size||104; const u='https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&margin=0&data='+encodeURIComponent(text); return `<img class="qr" width="${size}" height="${size}" src="${u}" alt="QR ໂປຣໄຟລ໌" loading="lazy">`; }

  } else if(tab==='work'){

    const cards=Object.keys(byMod).map(k=>{const m=modByKey(k); return `<div class="wk-card">${m?ic(m.icon):ic('doc')}<div class="wk-l">${m?m.label.replace(/\s*\(.*\)/,''):k}</div><span class="pill">${byMod[k].length}</span></div>`;}).join('');
    body=`<div class="prof-sec"><h5>${ic('clock')} ສະຖານະສັນຍາ & ໄລຍະການຈ້າງ</h5>
        <dl class="doc-dl">

        <div class="wk-grid">${cards||`<div class="empty" style="padding:18px">${ic('doc')}<h3>ຍັງບໍ່ມີເອກະສານ</h3></div>`}</div></div>`;
  } else {

function trackRow(e){
  const cs=contractStatus(e.start,e.end);
  const cls = cs.state==='expired'?'row-exp':(cs.state==='expiring'?'row-warn':'');
  return `<tr class="${cls}">
    <td><div class="trk-emp"><span class="trk-ava" style="--ac:${e.color}">${avatar(e,30)}</span><span><b>${e.name}</b><br><span class="trk-sub">${e.dept}</span></span></div></td>
    <td>${e.pos}</td><td>${e.type}</td><td>${e.start}</td><td>${e.end}</td>
    <td>${cs.elapsedTxt}</td><td>${cs.remainTxt}</td><td>${cs.badge}</td>
  </tr>`;
}
function contractTracker(){
  const rows = DB.employees.slice().sort((a,b)=>{
    const ra=contractStatus(a.start,a.end).remainDays, rb=contractStatus(b.start,b.end).remainDays;
    return (ra==null?1e9:ra)-(rb==null?1e9:rb);

function tableToXls(headers, rows2d, filename){
  const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const thead='<tr>'+headers.map(h=>`<th style="background:#1F6F66;color:#fff;border:1px solid #ccc;padding:6px">${esc(h)}</th>`).join('')+'</tr>';
  const tbody=rows2d.map(r=>'<tr>'+r.map(c=>`<td style="border:1px solid #ccc;padding:5px">${esc(c)}</td>`).join('')+'</tr>').join('');
  const html='\ufeff<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table>'+thead+tbody+'</table></body></html>';
  const blob=new Blob([html],{type:'application/vnd.ms-excel'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=(filename||'export').replace(/[^\w\-]+/g,'_')+'.xls';
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function parseTabular(text){
  let rows=[];
  if(/<table/i.test(text)){
    (text.match(/<tr[\s\S]*?<\/tr>/gi)||[]).forEach(tr=>{
      const cells=(tr.match(/<t[dh][\s\S]*?<\/t[dh]>/gi)||[]).map(td=>td.replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').trim());
      if(cells.length) rows.push(cells); });
  } else {
    rows=text.split(/\r?\n/).filter(l=>l.trim()).map(l=>l.split(',').map(s=>s.replace(/^"|"$/g,'').trim()));
  }
  if(rows.length) rows.shift();
  return rows;
}
function exportModule(mk){ const list=filteredDocs(mk); const m=modByKey(mk);
  tableToXls(['ເລກທີ','ຊື່ / ຫົວຂໍ້','ປະເພດເອກະສານ','ເດືອນ','ວັນທີ','ສະຖານະ'], list.map(d=>[d.docNo,d.name||d.docType,d.docType,d.month||'',d.date,d.status]), 'docs_'+(m?m.label.replace(/\s*\(.*\)/,''):mk));
  toast('ສົ່ງອອກ Excel ສຳເລັດ ('+list.length+' ແຖວ)', true);
}
function importModule(mk, file){ if(!file) return; const r=new FileReader();
  r.onload=ev=>{ try{ const rows=parseTabular(String(ev.target.result)); let added=0;
    rows.forEach(c=>{ if(!c.length||!(c[0]||c[1])) return; const name=c[1]||'';
      const rec={ id:'D'+(++DOC_SEQ), module:mk, docNo:c[0]||('IMP-'+DOC_SEQ), name, docType:c[2]||((modByKey(mk)||{}).label||'ເອກະສານ'), month:c[3]||today().slice(0,7), date:c[4]||today(), status:c[5]||'ນຳເຂົ້າ',
        sections:[{title:'ຂໍ້ມູນນຳເຂົ້າຈາກ Excel', rows:[['ຊື່ / ຫົວຂໍ້',name],['ປະເພດ',c[2]||''],['ເດືອນ',c[3]||'']]}], archived:true };
      const e=empByName(name); if(e) rec.empId=e.id; SAVED.push(rec); Store.save(rec); added++; });
    toast('ນຳເຂົ້າ '+added+' ແຖວ ສຳເລັດ', true); renderShell();
  }catch(err){ toast('ໄຟລ໌ບໍ່ຖືກຮູບແບບ (ຮອງຮັບ CSV ຫຼື .xls)', false); } };
  r.readAsText(file);
}

/* ============================================================
   v3 — MINI CHARTS (pure SVG) + DASHBOARD GRAPHS
   ============================================================ */
const CH = ['#1F6F66','#C9A24B','#8A5A2B','#3B3F8F','#9A3B6E','#2C73A3','#B5762F','#2E7D74'];
function barChart(data,o){ o=o||{}; const w=o.w||280,h=o.h||150,pad=22; const max=Math.max(1,...data.map(d=>d.value));
  const gap=(w-pad*2)/Math.max(1,data.length), bw=gap*0.56;
  const bars=data.map((d,i)=>{ const bh=(d.value/max)*(h-pad-26); const x=pad+i*gap+(gap-bw)/2, y=h-24-bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,bh).toFixed(1)}" rx="4" fill="${d.color||CH[i%CH.length]}"></rect>`
      +`<text x="${(x+bw/2).toFixed(1)}" y="${h-9}" text-anchor="middle" class="ch-x">${d.label}</text>`
      +`<text x="${(x+bw/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle" class="ch-v">${d.value}</text>`; }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" class="chart">${bars}</svg>`;
}
function donutChart(segs,o){ o=o||{}; const size=o.size||150,sw=o.sw||20,r=size/2-sw/2-2,cx=size/2,cy=size/2;
  const total=segs.reduce((a,s)=>a+s.value,0)||1; const C=2*Math.PI*r; let acc=0;
  const arcs=segs.map(s=>{ const frac=s.value/total,dash=frac*C; const seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-dasharray="${dash.toFixed(2)} ${(C-dash).toFixed(2)}" stroke-dashoffset="${(-acc*C).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"></circle>`; acc+=frac; return seg; }).join('');
  return `<svg viewBox="0 0 ${size} ${size}" class="chart"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#ECECEC" stroke-width="${sw}"></circle>${arcs}<text x="${cx}" y="${cy}" dy="0.35em" text-anchor="middle" class="ch-center">${total}</text></svg>`;
}
function legend(items){ return `<div class="ch-legend">${items.map(s=>`<div class="ch-leg"><span class="ch-dot" style="background:${s.color}"></span>${s.label} <b>${s.value}</b></div>`).join('')}</div>`; }
function progressRing(pct,label,color){ const r=38,C=2*Math.PI*r,dash=(Math.max(0,Math.min(100,pct))/100)*C; color=color||'#1F6F66';
  return `<div class="ring-wrap"><svg viewBox="0 0 92 92" class="chart" style="max-width:92px"><circle cx="46" cy="46" r="38" fill="none" stroke="#ECECEC" stroke-width="9"></circle><circle cx="46" cy="46" r="38" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${dash.toFixed(1)} ${(C-dash).toFixed(1)}" transform="rotate(-90 46 46)"></circle><text x="46" y="46" dy="0.35em" text-anchor="middle" class="ch-center" style="font-size:17px">${Math.round(pct)}%</text></svg><div class="ring-lb">${label}</div></div>`; }
function dashCharts(){

/* ============================================================
   v3 — TASK PLANNER (ແຜນວຽກ): day / week / month / calendar
   ============================================================ */
let TASKS = [];
const TASK_KEY = 'hrms_tasks_v3';
const WD = ['ຈັນ','ອັງຄານ','ພຸດ','ພະຫັດ','ສຸກ','ເສົາ','ອາທິດ'];
function taskPersist(){ try{ if(typeof localStorage!=='undefined') localStorage.setItem(TASK_KEY, JSON.stringify(TASKS)); }catch(e){} }
function taskLoad(){ try{ if(typeof localStorage!=='undefined'){ const raw=localStorage.getItem(TASK_KEY); if(raw){ const a=JSON.parse(raw); if(Array.isArray(a)){ TASKS.length=0; a.forEach(x=>TASKS.push(x)); return true; } } } }catch(e){} return false; }
function pd(ds){ const a=String(ds).split('-').map(Number); return new Date(a[0],(a[1]||1)-1,a[2]||1); }
function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function addDays(ds,n){ const d=pd(ds); d.setDate(d.getDate()+n); return iso(d); }
function startOfWeek(ds){ const d=pd(ds); const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return iso(d); }
function weekDates(ds){ const s=startOfWeek(ds); return [0,1,2,3,4,5,6].map(i=>addDays(s,i)); }
function monthDates(ds){ const d=pd(ds),y=d.getFullYear(),m=d.getMonth(),n=new Date(y,m+1,0).getDate(); const a=[]; for(let i=1;i<=n;i++) a.push(iso(new Date(y,m,i))); return a; }
function monthGrid(ds){ const md=monthDates(ds); const lead=(pd(md[0]).getDay()+6)%7; const cells=[]; for(let i=0;i<lead;i++) cells.push(null); md.forEach(x=>cells.push(x)); while(cells.length%7) cells.push(null); const wk=[]; for(let i=0;i<cells.length;i+=7) wk.push(cells.slice(i,i+7)); return wk; }
function fmtDay(ds){ const d=pd(ds); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }
function fmtFull(ds){ const d=pd(ds); return WD[(d.getDay()+6)%7]+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function shiftDate(ds,view,dir){ const d=pd(ds); if(view==='day') d.setDate(d.getDate()+dir); else if(view==='week') d.setDate(d.getDate()+7*dir); else d.setMonth(d.getMonth()+dir); return iso(d); }

  return `<div class="grid g2" style="grid-template-columns:1fr 240px;align-items:start">
    <div class="card card-pad"><div class="section-title"><span class="num">${ic('report')}</span> ບົດລາຍງານປະຈຳອາທິດ (${fmtDay(days[0])} – ${fmtDay(days[6])})</div>
      ${table([{t:'ວັນ'},{t:'ທັງໝົດ'},{t:'ສຳເລັດ'},{t:'ລໍຖ້າ'},{t:'ບໍ່ສຳເລັດ'}], rows)}</div>
    <div class="card card-pad chart-card"><h4>${ic('target')} ອັດຕາສຳເລັດ</h4>${progressRing(rate,'ສຳເລັດ '+tot.d+'/'+tot.t+' ວຽກ')}<dl class="kvs" style="margin-top:10px"><dt>ສຳເລັດ</dt><dd>${tot.d}</dd><dt>ລໍຖ້າ</dt><dd>${tot.s}</dd><dt>ບໍ່ສຳເລັດ</dt><dd>${tot.p}</dd></dl></div>
  </div>`;
}
function taskMonthView(emp,date){ const weeks=monthGrid(date);
  const rows=weeks.map((wk,i)=>{ const ds=wk.filter(Boolean); if(!ds.length) return ''; const c=ds.reduce((a,d)=>{const x=taskStat(emp,d);a.t+=x.total;a.d+=x.done;a.s+=x.sub;a.p+=x.plan;return a;},{t:0,d:0,s:0,p:0}); return `<tr><td>ອາທິດ ${i+1} (${fmtDay(ds[0])}–${fmtDay(ds[ds.length-1])})</td><td class="num">${c.t}</td><td class="num">${c.d}</td><td class="num">${c.s}</td><td class="num">${c.p}</td></tr>`; }).filter(Boolean);
  const md=monthDates(date); const tot=md.reduce((a,d)=>{const x=taskStat(emp,d);a.t+=x.total;a.d+=x.done;a.p+=x.plan;return a;},{t:0,d:0,p:0}); const rate=tot.t?Math.round(tot.d/tot.t*100):0;
  return `<div class="grid g2" style="grid-template-columns:1fr 240px;align-items:start">
    <div class="card card-pad"><div class="section-title"><span class="num">${ic('report')}</span> ບົດລາຍງານປະຈຳເດືອນ (ສະຫຼຸບຕາມອາທິດ)</div>
      ${table([{t:'ໄລຍະ'},{t:'ທັງໝົດ'},{t:'ສຳເລັດ'},{t:'ລໍຖ້າ'},{t:'ບໍ່ສຳເລັດ'}], rows)}
      <p class="nm" style="margin-top:10px;font-size:11.5px;color:var(--text-2)">ກົດ “ອາທິດ” ຫຼື “ມື້” ເພື່ອເບິ່ງລາຍລະອຽດແຕ່ລະວັນ.</p></div>
    <div class="card card-pad chart-card"><h4>${ic('target')} ອັດຕາສຳເລັດເດືອນ</h4>${progressRing(rate,'ສຳເລັດ '+tot.d+'/'+tot.t+' ວຽກ')}</div>
  </div>`;
}
function taskCalendarView(emp,date){ const weeks=monthGrid(date); const t=today();
  const head=WD.map(w=>`<div class="cal-h">${w}</div>`).join('');
  const cells=weeks.map(wk=>wk.map(d=>{ if(!d) return '<div class="cal-cell cal-empty"></div>'; const c=taskStat(emp,d); const carried=carriedFor(emp,d).length;
    const dots=`${c.done?`<span class="cd cd-done">${c.done}</span>`:''}${c.sub?`<span class="cd cd-sub">${c.sub}</span>`:''}${(c.plan+carried)?`<span class="cd cd-plan">${c.plan+carried}</span>`:''}`;
    return `<div class="cal-cell ${d===t?'cal-today':''} ${d===date?'cal-sel':''}" data-task-date="${d}"><div class="cal-d">${pd(d).getDate()}</div><div class="cal-dots">${dots}</div></div>`; }).join('')).join('');
  return `<div class="card card-pad"><div class="section-title"><span class="num">${ic('clock')}</span> ປະຕິທິນວຽກ (ພາບລວມເດືອນ)</div>
    <div class="cal-grid">${head}${cells}</div>
    <div class="cal-legend"><span class="cd cd-done">●</span> ສຳເລັດ &nbsp; <span class="cd cd-sub">●</span> ລໍຖ້າອະນຸມັດ &nbsp; <span class="cd cd-plan">●</span> ບໍ່ສຳເລັດ / ຄ້າງ</div></div>`;
}
function renderTimesheet(){
  const emp = state.taskEmp || (DB.employees[0]&&DB.employees[0].id); state.taskEmp=emp;
  const view = state.taskView || 'day';
  const date = state.taskDate || today();
  const empOpts = DB.employees.map(x=>`<option value="${x.id}" ${x.id===emp?'selected':''}>${x.name} · ${x.dept}</option>`).join('');
  const viewBtns = [['day','ມື້'],['week','ອາທິດ'],['month','ເດືອນ'],['calendar','ປະຕິທິນ']].map(v=>`<button class="seg-btn ${view===v[0]?'on':''}" data-task-view="${v[0]}">${v[1]}</button>`).join('');
  let body, navLabel;
  if(view==='day'){ body=taskDayView(emp,date); navLabel=fmtFull(date); }
  else if(view==='week'){ const wd=weekDates(date); body=taskWeekView(emp,date); navLabel='ອາທິດ '+fmtDay(wd[0])+' – '+fmtDay(wd[6]); }
  else if(view==='month'){ body=taskMonthView(emp,date); navLabel=pd(date).getFullYear()+'-'+String(pd(date).getMonth()+1).padStart(2,'0'); }
  else { body=taskCalendarView(emp,date); navLabel=pd(date).getFullYear()+'-'+String(pd(date).getMonth()+1).padStart(2,'0'); }
  return `<div class="page">
    ${pageHead({eyebrow:'ເວລາ & ຄ່າຕອບແທນ', title:'ແຜນວຽກ & ຕິດຕາມ (Task Planner)', desc:'ມອບໝາຍ ແລະ ຕິດຕາມວຽກພະນັກງານ ເປັນ ມື້ / ອາທິດ / ເດືອນ / ປະຕິທິນ. ວຽກທີ່ບໍ່ສົ່ງຫົວໜ້າຈະນັບເປັນບໍ່ສຳເລັດ ແລະ ຍົກໄປມື້ຖັດໄປ; ຫົວໜ້າອະນຸມັດແລ້ວຈຶ່ງນັບວ່າສຳເລັດ.'})}
    <div class="card card-pad task-bar">
      <div class="fb-item grow"><label>ພະນັກງານ (ເລືອກເປັນບຸກຄົນ)</label><select data-task-emp>${empOpts}</select></div>
      <div class="seg">${viewBtns}</div>
      <div class="task-nav"><button class="btn btn-ghost btn-sm" data-task-nav="-1">◀</button><span class="task-navlb">${navLabel}</span><button class="btn btn-ghost btn-sm" data-task-nav="1">▶</button></div>
    </div>
    <div id="task-host">${body}</div>
    ${relatedLinks('timesheet')}
  </div>`;
}
function addTask(){ const i=$('#task-title'); const v=i?i.value.trim():''; if(!v){ toast('ກະລຸນາພິມຊື່ວຽກ', false); return; }
  TASKS.push({id:'T'+Date.now(), empId:state.taskEmp||(DB.employees[0]&&DB.employees[0].id), date:state.taskDate||today(), title:v, status:'planned'}); taskPersist(); toast('ເພີ່ມວຽກສຳເລັດ', true); renderShell(); }
function taskSet(id,status){ const t=TASKS.find(x=>x.id===id); if(t){ t.status=status; taskPersist(); renderShell(); } }
function taskDel(id){ const i=TASKS.findIndex(x=>x.id===id); if(i>=0){ TASKS.splice(i,1); taskPersist(); renderShell(); } }
if(!taskLoad()){ seedTasks(); taskPersist(); }

/* ============================================================
   INIT
   ============================================================ */
/* ============================================================
   AUTHENTICATION (login by employee code + password)
   ============================================================ */
const AUTH_KEY = 'hrms_auth_v1';
const DEFAULT_PASS = '123456';
function roleForEmp(e){ if(e.id==='EMP-001') return 'hr'; if(e.level===1) return 'manager'; return 'employee'; }
function buildAccounts(){ return DB.employees.map(e=>({ code:e.id, name:e.name, pass:DEFAULT_PASS, role:roleForEmp(e), empId:e.id })); }
function normCode(s){ return String(s||'').trim().toUpperCase(); }
function findAccount(code, pass){
  const c=normCode(code); const accs=buildAccounts();
  const a=accs.find(x=> normCode(x.code)===c || normCode(x.code)==='EMP-'+c || normCode(x.code).replace('EMP-','')===c );
  if(!a) return null;
  if(String(pass)!==String(a.pass)) return {error:'pass'};
  return a;
}
function saveAuth(){ try{ if(typeof localStorage!=='undefined') localStorage.setItem(AUTH_KEY, JSON.stringify(state.authUser)); }catch(e){} }
function loadAuth(){ try{ if(typeof localStorage!=='undefined'){ const raw=localStorage.getItem(AUTH_KEY); if(raw){ const a=JSON.parse(raw); if(a&&a.code){ state.authUser=a; state.role=a.role||'employee'; } } } }catch(e){} }
function doLogin(){
  const c=$('#login-code'), p=$('#login-pass');
  const code=c?c.value.trim():'', pass=p?p.value:'';
  if(!code||!pass){ toast('ກະລຸນາໃສ່ລະຫັດພະນັກງານ ແລະ ລະຫັດຜ່ານ', false); return; }
  const a=findAccount(code, pass);
  if(!a){ toast('ບໍ່ພົບລະຫັດພະນັກງານນີ້', false); return; }
  if(a.error){ toast('ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ', false); return; }
  state.authUser={ code:a.code, name:a.name, role:a.role, empId:a.empId };
  state.role=a.role; state.page='dashboard'; state.doc=null; state.drawer=false;
  saveAuth(); toast('ຍິນດີຕ້ອນຮັບ '+a.name, true); renderShell();
}
function logout(){ state.authUser=null; try{ if(typeof localStorage!=='undefined') localStorage.removeItem(AUTH_KEY); }catch(e){} state.page='dashboard'; state.doc=null; state.drawer=false; renderShell(); }
function fillDemo(code){ const c=$('#login-code'), p=$('#login-pass'); if(c) c.value=code; if(p){ p.value=DEFAULT_PASS; if(p.focus){ try{p.focus();}catch(e){} } } }
function renderLogin(){
  const accs=buildAccounts(); const pick=r=>accs.find(a=>a.role===r);
  const demos=[pick('hr'),pick('manager'),pick('employee')].filter(Boolean);
  const demoBtns=demos.map(a=>`<button class="login-demo-btn" data-login-demo="${a.code}">${a.code} · ${ROLES[a.role].short}</button>`).join('');
  return `<div class="login-wrap"><div class="login-card">
    <div class="login-brand"><div class="seal">${escapeHtml(company.seal)}</div><div style="text-align:left"><b style="font-family:var(--serif);font-size:16px;color:var(--ink-3);display:block;line-height:1.2">${escapeHtml(company.name)}</b><span style="font-size:11px;color:var(--text-3)">HRMS · ລະບົບບໍລິຫານບຸກຄະລາກອນ</span></div></div>
    <div class="login-title">ເຂົ້າສູ່ລະບົບ</div>
    <div class="login-sub">ໃສ່ລະຫັດພະນັກງານ ແລະ ລະຫັດຜ່ານ ເພື່ອເຂົ້າໃຊ້ງານ</div>
    <div class="login-field"><label>ລະຫັດພະນັກງານ</label><input type="text" id="login-code" placeholder="ເຊັ່ນ EMP-001" autocomplete="username"></div>
    <div class="login-field"><label>ລະຫັດຜ່ານ</label><input type="password" id="login-pass" placeholder="ລະຫັດຜ່ານ" autocomplete="current-password"></div>
    <button class="btn btn-gold login-btn" data-login>${ic('shield')} ເຂົ້າສູ່ລະບົບ</button>
    <div class="login-demo"><div class="dh">ບັນຊີທົດລອງ (ກົດເພື່ອຕື່ມ · ລະຫັດຜ່ານ: <b>${DEFAULT_PASS}</b>)</div><div class="login-demo-row">${demoBtns}</div></div>
  </div></div>`;
}
(function init(){
  const st=document.createElement('style');
  st.textContent='.pop::after{top:-5px;left:22px}';
  document.head.appendChild(st);
  loadCompany();
  loadEmployees();
  loadAuth();
  const o=$('#overlay'); if(o) o.addEventListener('click', ()=>{ closeDrawer(); hidePop(); closeEmp(); closeSigPick(); });
  const openFromHash=()=>{ if(typeof location==='undefined') return; const m=(location.hash||'').match(/emp=([\w-]+)/); if(m && empById(m[1])) openEmp(m[1]); };
  window.addEventListener('hashchange', openFromHash);
  /* realtime sync across browser tabs (local mode) */
  window.addEventListener('storage', e=>{ if(e.key===DB_KEY && !Store.online){ Store.load(); renderShell(); openFromHash(); } });
  /* attempt cloud realtime sync if configured */
  initOnline();
  renderShell();
  openFromHash();
})();
</script>
