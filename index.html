<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ລະບົບບໍລິຫານ HR (HRMS) — ຕົ້ນແບບ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=Noto+Serif+Lao:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E3B38; --ink-2:#14524D; --ink-3:#0A2B29;
  --gold:#B0823A; --gold-2:#9A6F2E; --gold-soft:#EADaB6; --gold-tint:#F6EFDD;
  --paper:#FBFAF6; --paper-2:#F4F1E9; --paper-3:#EEEADD;
  --line:#E4DECF; --line-2:#CDC6B2;
  --text:#1A211E; --text-2:#5C645D; --text-3:#8A9189;
  --danger:#9B2C2C; --danger-soft:#F4E3E1;
  --success:#2F6B4F; --success-soft:#E2EFE7;
  --info:#2C5A7A; --info-soft:#E2ECF3;
  --warn:#9A6F2E; --warn-soft:#F6EFDD;
  --radius:10px; --radius-sm:7px; --radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(20,40,38,.06), 0 1px 3px rgba(20,40,38,.05);
  --shadow:0 6px 24px -8px rgba(14,59,56,.22), 0 2px 8px -2px rgba(14,59,56,.10);
  --shadow-lg:0 24px 60px -16px rgba(10,43,41,.40);
  --sans:"Noto Sans Lao", system-ui, sans-serif;
  --serif:"Noto Serif Lao", Georgia, serif;
  --sidebar-w:264px; --topbar-h:62px; --drawer-w:430px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans); color:var(--text); background:var(--paper-2);
  font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;
  font-feature-settings:"tnum" 0;
}
.tnum{font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1}
button,input,select,textarea{font-family:inherit; font-size:inherit; color:inherit}
button{cursor:pointer; background:none; border:none}
svg{width:16px; height:16px; flex:none; vertical-align:middle}
a{color:var(--ink-2); text-decoration:none}
h1,h2,h3,h4{font-family:var(--serif); font-weight:600; line-height:1.25; color:var(--ink-3)}
::selection{background:var(--gold-soft)}
:focus-visible{outline:2.5px solid var(--gold); outline-offset:2px; border-radius:4px}
.scroll{scrollbar-width:thin; scrollbar-color:var(--line-2) transparent}
.scroll::-webkit-scrollbar{width:9px;height:9px}
.scroll::-webkit-scrollbar-thumb{background:var(--line-2); border-radius:8px; border:2px solid var(--paper)}

/* ===== App shell ===== */
.app{display:grid; grid-template-columns:var(--sidebar-w) 1fr; grid-template-rows:var(--topbar-h) 1fr; height:100vh; overflow:hidden}

/* ===== Topbar ===== */
.topbar{
  grid-column:1/3; display:flex; align-items:center; gap:14px;
  padding:0 18px 0 16px; background:var(--ink); color:#EAF1EF; z-index:40;
  border-bottom:3px solid var(--gold);
}
.brand{display:flex; align-items:center; gap:11px; min-width:var(--sidebar-w); padding-right:14px}
.seal{
  width:38px;height:38px;border-radius:50%; flex:none; position:relative;
  background:radial-gradient(circle at 30% 28%, #D9B870, var(--gold) 55%, var(--gold-2));
  display:grid;place-items:center; box-shadow:inset 0 0 0 2px rgba(255,255,255,.35), inset 0 0 0 4px var(--gold-2);
}
.seal span{font-family:var(--serif); font-weight:700; font-size:16px; color:#3A2B0E}
.brand-txt b{font-family:var(--serif); font-size:15px; color:#fff; display:block; line-height:1.2}
.brand-txt small{font-size:11px; color:#9FC0BB; letter-spacing:.04em}
.topbar-sys{font-family:var(--serif); font-size:13px; color:#Bcd6d2; border-left:1px solid rgba(255,255,255,.16); padding-left:14px; flex:1}
.topbar-sys b{color:#fff}
.topbar-actions{display:flex; align-items:center; gap:9px}
.role-switch{display:flex; background:rgba(255,255,255,.08); border-radius:8px; padding:3px; gap:2px}
.role-switch button{padding:6px 11px; border-radius:6px; font-size:12.5px; color:#A9C7C2; font-weight:500; white-space:nowrap; transition:.16s}
.role-switch button.on{background:var(--gold); color:#2C1F06; font-weight:600}
.role-switch button:not(.on):hover{color:#fff}
.icon-btn{width:38px;height:38px;border-radius:8px; display:grid;place-items:center; color:#C9DEDA; transition:.16s; position:relative}
.icon-btn:hover{background:rgba(255,255,255,.10); color:#fff}
.manual-btn{
  display:flex;align-items:center;gap:8px; padding:8px 13px; border-radius:9px;
  background:var(--gold); color:#2C1F06; font-weight:600; font-size:13px; transition:.16s; white-space:nowrap;
  box-shadow:0 2px 0 var(--gold-2);
}
.manual-btn:hover{filter:brightness(1.06); transform:translateY(-1px)}
.user-chip{display:flex;align-items:center;gap:9px; padding-left:6px}
.avatar{width:34px;height:34px;border-radius:50%; background:linear-gradient(135deg,#1f6b65,#0E3B38); display:grid;place-items:center; color:#EAD9B5; font-weight:600; font-size:13px; border:1.5px solid rgba(234,217,181,.4)}
.user-chip .nm{font-size:12.5px;color:#fff;font-weight:500;line-height:1.15}
.user-chip .rl{font-size:11px;color:#9FC0BB}

/* ===== Sidebar ===== */
.sidebar{background:var(--ink-3); color:#A9C2BE; overflow-y:auto; padding:14px 12px 28px; z-index:30}
.nav-group{margin-top:16px}
.nav-group:first-child{margin-top:4px}
.nav-label{font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:#6E8A85; font-weight:600; padding:0 12px 8px; display:flex; align-items:center; gap:8px}
.nav-label::after{content:""; flex:1; height:1px; background:rgba(255,255,255,.07)}
.nav-item{
  display:flex; align-items:center; gap:11px; width:100%; text-align:left;
  padding:9px 12px; border-radius:8px; color:#B6CFCB; font-size:13px; font-weight:500;
  transition:.13s; position:relative; margin-bottom:1px;
}
.nav-item svg{width:17px;height:17px;flex:none;opacity:.8}
.nav-item:hover{background:rgba(255,255,255,.055); color:#fff}
.nav-item.on{background:linear-gradient(90deg, rgba(176,130,58,.22), rgba(176,130,58,.05)); color:#fff}
.nav-item.on::before{content:"";position:absolute;left:-12px;top:6px;bottom:6px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-item.on svg{opacity:1; color:var(--gold-soft)}
.nav-badge{margin-left:auto; font-size:11px; background:rgba(176,130,58,.25); color:var(--gold-soft); padding:1px 7px; border-radius:20px; font-variant-numeric:tabular-nums}

/* ===== Main ===== */
.main{overflow-y:auto; background:var(--paper-2); position:relative}
.page{max-width:1120px; margin:0 auto; padding:26px 30px 70px}
.page-head{display:flex; align-items:flex-start; gap:16px; margin-bottom:22px; flex-wrap:wrap}
.page-head .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-2); font-weight:600; margin-bottom:5px; display:flex;align-items:center;gap:7px}
.page-head h1{font-size:25px; letter-spacing:-.01em}
.page-head p{color:var(--text-2); font-size:13.5px; margin-top:5px; max-width:640px}
.page-head .spacer{flex:1}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px; padding:9px 15px; border-radius:9px; font-weight:600; font-size:13px; transition:.15s; border:1px solid transparent; white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--ink); color:#fff; box-shadow:0 2px 0 var(--ink-3)}
.btn-primary:hover{background:var(--ink-2); transform:translateY(-1px)}
.btn-gold{background:var(--gold); color:#2C1F06; box-shadow:0 2px 0 var(--gold-2)}
.btn-gold:hover{filter:brightness(1.05); transform:translateY(-1px)}
.btn-ghost{background:#fff; color:var(--ink-2); border-color:var(--line-2)}
.btn-ghost:hover{background:var(--paper-3); border-color:var(--gold)}
.btn-sm{padding:6px 11px; font-size:12px; border-radius:7px}
.btn-danger{background:var(--danger-soft); color:var(--danger); border-color:#E7C9C6}
.btn-danger:hover{background:#EED5D2}
.btn-success{background:var(--success-soft); color:var(--success); border-color:#CADDD0}

/* cards & surfaces */
.card{background:#fff; border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm)}
.card-pad{padding:20px 22px}
.grid{display:grid; gap:16px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
.section-title{font-family:var(--serif); font-size:16px; color:var(--ink-3); margin-bottom:14px; display:flex; align-items:center; gap:9px}
.section-title .num{font-size:12px; color:var(--gold-2); background:var(--gold-tint); border:1px solid var(--gold-soft); width:24px;height:24px;border-radius:6px; display:grid;place-items:center; font-weight:700; flex:none}

/* stat cards */
.stat{background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; position:relative; overflow:hidden}
.stat::after{content:"";position:absolute;right:-14px;top:-14px;width:64px;height:64px;border-radius:50%;background:var(--gold-tint);opacity:.7}
.stat .ic{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;background:var(--paper-3);color:var(--ink-2);margin-bottom:11px;position:relative;z-index:1}
.stat .ic svg{width:18px;height:18px}
.stat .v{font-family:var(--serif);font-size:27px;font-weight:600;color:var(--ink-3);line-height:1;position:relative;z-index:1;font-variant-numeric:tabular-nums}
.stat .l{font-size:12px;color:var(--text-2);margin-top:6px;position:relative;z-index:1}
.stat .d{font-size:11px;margin-top:7px;font-weight:600;display:inline-flex;align-items:center;gap:3px;position:relative;z-index:1}
.stat .d.up{color:var(--success)} .stat .d.dn{color:var(--danger)}

/* tables */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:#fff}
table.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
.tbl thead th{background:var(--paper-3);text-align:left;padding:11px 14px;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-2);font-weight:600;border-bottom:1.5px solid var(--line-2);white-space:nowrap}
.tbl tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:var(--paper)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}
.tbl .nm{font-weight:600;color:var(--ink-3)}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.b-success{background:var(--success-soft);color:var(--success)}
.b-warn{background:var(--warn-soft);color:var(--warn)}
.b-info{background:var(--info-soft);color:var(--info)}
.b-danger{background:var(--danger-soft);color:var(--danger)}
.b-mute{background:var(--paper-3);color:var(--text-2)}

/* ===== Forms / official document ===== */
.doc{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.doc-head{padding:20px 26px 18px;border-bottom:2px solid var(--ink);position:relative;background:linear-gradient(180deg,#fff,var(--paper))}
.doc-head .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:18px}
.doc-co{display:flex;gap:13px;align-items:flex-start}
.doc-co .seal{width:46px;height:46px}
.doc-co .seal span{font-size:19px}
.doc-co b{font-family:var(--serif);font-size:16px;color:var(--ink-3);display:block;line-height:1.25}
.doc-co small{font-size:11.5px;color:var(--text-2);display:block;line-height:1.5}
.doc-meta{text-align:right;font-size:12px;color:var(--text-2);line-height:1.7;flex:none}
.doc-meta .docno{font-family:var(--serif);font-weight:600;color:var(--gold-2);font-size:13px}
.doc-meta input{border:none;border-bottom:1px dashed var(--line-2);text-align:right;width:120px;background:transparent;padding:1px 2px}
.doc-title{text-align:center;margin-top:16px}
.doc-title h2{font-size:19px;letter-spacing:.01em}
.doc-title .sub{font-size:12px;color:var(--text-2);margin-top:3px}
.doc-body{padding:24px 26px}
.fieldset{margin-bottom:22px}
.fieldset > legend, .fs-title{font-family:var(--serif);font-size:14px;color:var(--ink-3);font-weight:600;margin-bottom:13px;padding-bottom:7px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;width:100%}
.frow{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 18px;margin-bottom:14px}
.frow.c3{grid-template-columns:repeat(3,1fr)}
.frow.c1{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12.5px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.field label .req{color:var(--danger)}
.field input, .field select, .field textarea{
  padding:9px 11px;border:1px solid var(--line-2);border-radius:var(--radius-sm);background:var(--paper);
  transition:.14s;width:100%;font-size:13px;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px var(--gold-tint)}
.field textarea{resize:vertical;min-height:64px}
.field .hint{font-size:11px;color:var(--text-3)}
.field-read{padding:9px 11px;background:var(--paper-3);border:1px solid var(--line);border-radius:var(--radius-sm);font-size:13px;color:var(--text)}

/* inline manual tooltip trigger */
.help{
  width:16px;height:16px;border-radius:50%;background:var(--gold-tint);border:1px solid var(--gold-soft);
  color:var(--gold-2);font-size:10px;font-weight:700;display:inline-grid;place-items:center;cursor:help;flex:none;
  font-family:var(--sans);transition:.13s;
}
.help:hover{background:var(--gold);color:#fff;border-color:var(--gold)}

/* calc result strip */
.calc-strip{display:flex;flex-wrap:wrap;gap:0;border:1px solid var(--ink);border-radius:var(--radius);overflow:hidden;margin-top:6px;background:var(--ink)}
.calc-cell{flex:1;min-width:130px;padding:14px 16px;color:#CFE3DF;background:var(--ink);position:relative}
.calc-cell + .calc-cell{border-left:1px solid rgba(255,255,255,.12)}
.calc-cell .cl{font-size:11px;color:#8FB3AE;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.calc-cell .cv{font-family:var(--serif);font-size:21px;font-weight:600;color:#fff;font-variant-numeric:tabular-nums;line-height:1.1}
.calc-cell.final{background:var(--gold)}
.calc-cell.final .cl{color:#5E4715} .calc-cell.final .cv{color:#241A06}

/* signature block */
.sign-block{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:28px;padding-top:22px;border-top:1px dashed var(--line-2)}
.sign{text-align:center}
.sign .role{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px}
.sign-area{min-height:54px;display:flex;align-items:flex-end;justify-content:center;padding:2px;border-radius:6px}
.sign-area.pickable{cursor:pointer}
.sign-area.pickable:hover{background:var(--gold-tint)}
.sign-img{max-width:100%;height:auto;display:block;object-fit:contain}
.sign-pick-cta{font-size:11px;color:var(--gold-2);font-weight:600;display:inline-flex;align-items:center;gap:5px;padding:6px 9px;border:1px dashed var(--line-2);border-radius:7px}
.sign-pick-cta svg{width:13px;height:13px}
.sign-rule{border-top:1px solid var(--text-2);margin:4px 8px 0}
.sign .nm{font-size:11px;color:var(--text-2);margin-top:4px}
.sign-ctrl{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:7px}
.sign-ctrl input[type=range]{width:88px;accent-color:var(--gold-2)}
.sign-mini{width:24px;height:24px;border:1px solid var(--line-2);border-radius:6px;background:#fff;color:var(--text-3);cursor:pointer;display:grid;place-items:center}
.sign-mini:hover{border-color:#E0A09A;color:#B23A2E}
.sign-mini svg{width:13px;height:13px}
/* signature library */
.sig-up-prev{min-height:74px;border:1.5px dashed var(--line-2);border-radius:9px;background:var(--paper-3);display:grid;place-items:center;color:var(--text-3);font-size:12px;padding:10px;text-align:center}
.sig-up-prev img{max-height:84px;max-width:100%}
.sig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-top:8px}
.sig-card{position:relative;border:1px solid var(--line-2);border-radius:11px;padding:12px;background:#fff;display:flex;flex-direction:column;gap:9px}
.sig-prev{height:74px;border-radius:8px;background:var(--paper-3);display:grid;place-items:center;overflow:hidden;border:1px solid var(--line)}
.sig-prev img{max-height:64px;max-width:90%}
.sig-nm{font-size:12.5px;font-weight:700;color:var(--ink-3)}
.sig-po{font-size:11px;color:var(--text-2)}
.sig-del{position:absolute;top:8px;right:8px;width:26px;height:26px;border:1px solid var(--line-2);border-radius:7px;background:#fff;color:var(--text-3);cursor:pointer;display:grid;place-items:center}
.sig-del:hover{border-color:#E0A09A;color:#B23A2E}
.sig-del svg{width:13px;height:13px}
.sigpick{position:fixed;inset:0;z-index:62;display:none;align-items:center;justify-content:center;padding:30px 16px}
.sigpick.show{display:flex}
.sigpick-inner{background:var(--paper);border:1px solid var(--line-2);border-radius:14px;max-width:460px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.26);overflow:hidden;animation:popIn .16s ease}
.sigpick-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);font-size:14px;color:var(--ink-3)}
.sigpick-list{padding:12px;max-height:60vh;overflow:auto;display:flex;flex-direction:column;gap:8px}
.sig-pick-item{display:flex;align-items:center;gap:12px;padding:9px 11px;border:1px solid var(--line-2);border-radius:10px;background:#fff;cursor:pointer;text-align:left;width:100%;font-family:inherit}
.sig-pick-item:hover{border-color:var(--gold);background:var(--gold-tint)}
.sig-pick-prev{width:84px;height:46px;border-radius:6px;background:var(--paper-3);display:grid;place-items:center;overflow:hidden;flex:0 0 auto;border:1px solid var(--line)}
.sig-pick-prev img{max-width:78px;max-height:40px}
.stamp-note{margin-top:20px;font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:7px;background:var(--paper);border:1px dashed var(--line-2);border-radius:8px;padding:9px 12px}

.form-foot{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 26px;border-top:1px solid var(--line);background:var(--paper);flex-wrap:wrap}
.foot-note{font-size:11.5px;color:var(--text-3);display:flex;align-items:center;gap:7px}

/* steps / flow */
.flow{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.flow-step{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:30px;padding:7px 14px 7px 8px;font-size:12.5px;color:var(--text)}
.flow-step .n{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700;font-family:var(--serif);flex:none}
.flow-step.done .n{background:var(--success)}
.flow-step.active{border-color:var(--gold);background:var(--gold-tint)}
.flow-step.active .n{background:var(--gold);color:#2C1F06}
.flow-arrow{color:var(--line-2);flex:none}

/* ===== E-Manual drawer ===== */
.overlay{position:fixed;inset:0;background:rgba(10,43,41,.34);backdrop-filter:blur(2px);opacity:0;visibility:hidden;transition:.25s;z-index:50}
.overlay.show{opacity:1;visibility:visible}
.drawer{
  position:fixed;top:0;right:0;height:100vh;width:var(--drawer-w);max-width:92vw;background:var(--paper);
  box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:60;
  display:flex;flex-direction:column;border-left:1px solid var(--line-2);
}
.drawer.show{transform:translateX(0)}
.drawer-head{background:var(--ink);color:#fff;padding:18px 20px;position:relative;flex:none;border-bottom:3px solid var(--gold)}
.drawer-head .kicker{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-soft);font-weight:600;display:flex;align-items:center;gap:7px}
.drawer-head h3{color:#fff;font-size:18px;margin-top:7px;line-height:1.25}
.drawer-head .meta{font-size:12px;color:#9FC0BB;margin-top:6px;display:flex;gap:14px;flex-wrap:wrap}
.drawer-close{position:absolute;top:14px;right:14px;color:#Bcd6d2}
.drawer-close:hover{color:#fff}
.drawer-tabs{display:flex;gap:4px;padding:10px 14px 0;background:var(--paper);border-bottom:1px solid var(--line);flex:none;overflow-x:auto}
.drawer-tab{padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--text-2);border-radius:7px 7px 0 0;white-space:nowrap;border-bottom:2px solid transparent;transition:.13s}
.drawer-tab.on{color:var(--ink-3);border-bottom-color:var(--gold);background:var(--gold-tint)}
.drawer-tab:hover:not(.on){color:var(--ink-3)}
.drawer-body{flex:1;overflow-y:auto;padding:20px 22px 50px}
.man-sec{margin-bottom:24px;scroll-margin-top:12px}
.man-sec h4{font-size:14.5px;color:var(--ink-3);margin-bottom:10px;display:flex;align-items:center;gap:9px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.man-sec h4 .mn{width:24px;height:24px;border-radius:7px;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700;font-family:var(--serif);flex:none}
.man-sec p{font-size:13px;color:var(--text);margin-bottom:9px;line-height:1.65}
.man-list{list-style:none;display:flex;flex-direction:column;gap:7px;margin:4px 0 6px}
.man-list li{font-size:12.8px;color:var(--text);padding-left:22px;position:relative;line-height:1.55}
.man-list li::before{content:"";position:absolute;left:6px;top:8px;width:6px;height:6px;border-radius:2px;background:var(--gold);transform:rotate(45deg)}
.man-steps{counter-reset:s;list-style:none;display:flex;flex-direction:column;gap:9px;margin:6px 0}
.man-steps li{counter-increment:s;font-size:12.8px;color:var(--text);padding:9px 12px 9px 40px;position:relative;background:#fff;border:1px solid var(--line);border-radius:9px;line-height:1.5}
.man-steps li::before{content:counter(s);position:absolute;left:9px;top:9px;width:22px;height:22px;border-radius:6px;background:var(--gold-tint);border:1px solid var(--gold-soft);color:var(--gold-2);display:grid;place-items:center;font-size:11px;font-weight:700;font-family:var(--serif)}
.man-steps li b{color:var(--ink-3)}
.callout{border-radius:9px;padding:12px 14px;font-size:12.5px;margin:6px 0 10px;border:1px solid}
.callout b{display:block;margin-bottom:6px;font-size:12.5px}
.co-danger{background:var(--danger-soft);border-color:#E7C9C6;color:#6E2020}
.co-danger b{color:var(--danger)}
.co-warn{background:var(--warn-soft);border-color:var(--gold-soft);color:#5E4715}
.co-warn b{color:var(--gold-2)}
.co-info{background:var(--info-soft);border-color:#CFE0EC;color:#23485F}
.co-info b{color:var(--info)}
.retain-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
.retain-tbl td{padding:7px 10px;border:1px solid var(--line)}
.retain-tbl td:last-child{text-align:right;font-weight:600;color:var(--ink-3);font-variant-numeric:tabular-nums;white-space:nowrap}
.retain-tbl tr:nth-child(odd) td{background:var(--paper)}
.efile{background:var(--ink-3);color:#A9C2BE;border-radius:9px;padding:14px 16px;font-family:ui-monospace,monospace;font-size:12px;line-height:1.75;white-space:pre;overflow-x:auto}
.efile .fld{color:var(--gold-soft)}

/* popover (inline help) */
.pop{position:fixed;z-index:80;max-width:320px;background:var(--ink-3);color:#E7F0EE;border-radius:11px;padding:13px 15px;box-shadow:var(--shadow-lg);font-size:12.5px;line-height:1.55;border:1px solid rgba(176,130,58,.4);opacity:0;visibility:hidden;transform:translateY(4px);transition:.16s}
.pop.show{opacity:1;visibility:visible;transform:translateY(0)}
.pop .pt{font-family:var(--serif);font-weight:600;color:var(--gold-soft);font-size:12.5px;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.pop .pl{margin-top:9px;display:inline-flex;align-items:center;gap:6px;color:var(--gold-soft);font-size:11.5px;font-weight:600;cursor:pointer}
.pop .pl:hover{text-decoration:underline}
.pop::after{content:"";position:absolute;width:11px;height:11px;background:var(--ink-3);transform:rotate(45deg);border-right:1px solid rgba(176,130,58,.4);border-bottom:1px solid rgba(176,130,58,.4)}

/* toast */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:9px;align-items:center}
.toast{display:flex;align-items:center;gap:10px;background:var(--ink-3);color:#fff;padding:12px 18px;border-radius:11px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;border-left:3px solid var(--gold);animation:tin .3s,tout .3s 3.4s forwards}
.toast.ok{border-left-color:#4FBF8B}
.toast svg{width:18px;height:18px;color:var(--gold-soft)}
@keyframes tin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(12px)}}

/* misc */
.empty{text-align:center;padding:46px 20px;color:var(--text-2)}
.empty svg{width:42px;height:42px;color:var(--line-2);margin-bottom:12px}
.empty h3{font-size:16px;color:var(--ink-3);margin-bottom:6px}
.tag-row{display:flex;gap:8px;flex-wrap:wrap}
.pill{font-size:11.5px;padding:4px 11px;border-radius:20px;background:var(--paper-3);color:var(--text-2);border:1px solid var(--line);font-weight:500}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.divider{height:1px;background:var(--line);margin:20px 0}
.kvs{display:grid;grid-template-columns:auto 1fr;gap:9px 18px;font-size:13px}
.kvs dt{color:var(--text-2)}
.kvs dd{color:var(--ink-3);font-weight:500;text-align:right;font-variant-numeric:tabular-nums}
.mono{font-family:ui-monospace,"SF Mono",monospace;font-size:12.5px}

/* dev docs */
.api-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;background:#fff;font-size:12.5px}
.api-m{font-family:ui-monospace,monospace;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;flex:none;width:54px;text-align:center}
.m-get{background:var(--info-soft);color:var(--info)} .m-post{background:var(--success-soft);color:var(--success)}
.m-put{background:var(--warn-soft);color:var(--warn)} .m-del{background:var(--danger-soft);color:var(--danger)}
.api-path{font-family:ui-monospace,monospace;color:var(--ink-3);font-weight:600;flex:none}
.api-desc{color:var(--text-2);font-size:12px}
.schema{background:var(--ink-3);color:#cfe3df;border-radius:11px;padding:18px 20px;font-family:ui-monospace,monospace;font-size:12.5px;line-height:1.7;overflow-x:auto}
.schema .tn{color:var(--gold-soft);font-weight:700}
.schema .pk{color:#7FD3B8}
.schema .fk{color:#E0A96D}
.schema .cm{color:#6E8A85;font-style:italic}

.menu-btn{display:none}
/* ===== Responsive ===== */
@media(max-width:920px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;top:var(--topbar-h);bottom:0;left:0;width:280px;transform:translateX(-100%);transition:.25s;box-shadow:var(--shadow-lg)}
  .sidebar.show{transform:translateX(0)}
  .brand{min-width:auto}
  .topbar-sys{display:none}
  .menu-btn{display:grid}
  .role-switch button{padding:6px 8px;font-size:11.5px}
  .manual-btn span{display:none}
  .user-chip .meta{display:none}
}
@media(max-width:680px){
  .page{padding:18px 16px 60px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .frow,.frow.c3{grid-template-columns:1fr}
  .sign-block{grid-template-columns:1fr 1fr;gap:26px}
  .ct-grid{grid-template-columns:1fr!important}
  .rel-grid{grid-template-columns:1fr 1fr!important}
  .role-switch .rl-txt{display:none}
  .page-head h1{font-size:21px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
/* national official header */
.doc-nation{text-align:center;padding:14px 26px 4px;border-bottom:1px dotted var(--line-2)}
.doc-nation .n1{font-family:var(--serif);font-weight:700;font-size:14.5px;color:var(--ink-3);letter-spacing:.01em}
.doc-nation .n2{font-size:11.5px;color:var(--gold-2);font-weight:600;margin-top:2px}
.doc-nation .n3{width:54px;height:2px;background:var(--gold);margin:7px auto 0;border-radius:2px}
/* contract photo + read grids */
.ct-grid{display:grid;grid-template-columns:1fr 172px;gap:18px;align-items:stretch}
.photo-up{display:flex;flex-direction:column;gap:9px;align-items:stretch}
.photo-prev{width:100%;height:100%;min-height:212px;border:1.5px dashed var(--line-2);border-radius:10px;background:var(--paper-3);display:grid;place-items:center;overflow:hidden;text-align:center;color:var(--text-3);font-size:11px;padding:8px}
.photo-prev img{width:100%;height:100%;object-fit:cover}
.dv-photo{float:right;width:120px;height:150px;border:1px solid var(--line-2);border-radius:9px;overflow:hidden;margin:0 0 12px 16px}
.dv-photo img{width:100%;height:100%;object-fit:cover}
.kv-read{display:grid;grid-template-columns:1fr 1fr;gap:10px 22px}
.kvr{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);padding:7px 2px;font-size:13px}
.kvr .k{color:var(--text-2)}
.kvr .v{color:var(--ink-3);font-weight:600;text-align:right}
/* doc view action bar */
.doc-actions{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.docview .doc{max-width:880px}
/* clickable record rows */
.rec-row{cursor:pointer;transition:background .12s}
.rec-row:hover{background:var(--gold-tint)}
.row-open{display:inline-flex;align-items:center;gap:5px;color:var(--gold-2);font-weight:600;font-size:12px;white-space:nowrap}
/* related links */
.rel-links{margin-top:16px;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.rel-links .rl-head{font-family:var(--serif);font-size:13.5px;color:var(--ink-3);font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.rel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.rel-card{display:flex;align-items:center;gap:9px;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;transition:.13s;text-align:left}
.rel-card:hover{border-color:var(--gold);background:var(--gold-tint);transform:translateY(-1px)}
.rel-card .ri{width:30px;height:30px;border-radius:8px;background:var(--ink);color:#fff;display:grid;place-items:center;flex:none}
.rel-card .rt{font-size:12.5px;font-weight:600;color:var(--ink-3);line-height:1.25}
/* archive */
.arc-group{margin-bottom:24px}
.arc-gh{font-family:var(--serif);font-size:14px;color:var(--gold-2);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.04em}
/* saved-document viewer · related-link chips · clickable rows */
.doc-dl{display:grid;grid-template-columns:175px 1fr;gap:7px 16px;font-size:13px;margin-top:2px}
.doc-dl dt{color:var(--text-2);font-weight:500}
.doc-dl dd{color:var(--ink-3);font-weight:600}
.id-photo{float:right;width:106px;height:132px;border:1px solid var(--line-2);border-radius:8px;overflow:hidden;margin:0 0 10px 18px;background:var(--paper-3)}
.id-photo img{width:100%;height:100%;object-fit:cover}
.doc-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.chip-row{display:flex;flex-wrap:wrap;gap:9px}
.chip{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--line-2);border-radius:999px;background:#fff;font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.13s}
.chip:hover{border-color:var(--gold);background:var(--gold-tint);color:var(--ink-3)}
.chip svg{width:15px;height:15px}
.tbl tr.rowlink{cursor:pointer}
.tbl tr.rowlink:hover{background:var(--gold-tint)}
/* identity strip in documents */
.doc-id{display:flex;gap:16px;align-items:stretch;border:1px solid var(--line-2);border-radius:10px;padding:12px 14px;margin-bottom:12px;background:var(--paper-3)}
.doc-id-dl{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12.5px;flex:1;min-width:0;align-content:center}
.doc-id-dl dt{color:var(--text-2)}
.doc-id-dl dd{color:var(--ink-3);font-weight:600}
.doc-id-photo{flex:0 0 122px;align-self:stretch;border-radius:8px;display:grid;place-items:center;min-height:160px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
.doc-id-photo .idp-ini{color:#fff;font-weight:800;font-size:44px;font-family:var(--serif);letter-spacing:.02em}
.doc-id-photo-img{background:var(--paper-3)}
.doc-id-photo-img img{width:100%;height:100%;object-fit:cover}
/* duties as tight heading list (number next to text) */
.doc-duties{margin-top:4px;font-size:13px}
.dd-row{display:flex;gap:7px;align-items:baseline;padding:2.5px 0;line-height:1.55}
.dd-row.dd-l2{padding-left:24px}
.dd-row.dd-l3{padding-left:48px}
.dd-pf{flex:0 0 auto;font-weight:700;color:var(--gold-2)}
.dd-row.dd-l1 .dd-pf{color:var(--ink-3);font-size:14px}
.dd-tx{color:var(--ink-3)}
.dd-row.dd-l1 .dd-tx{font-weight:700}
/* reviewer comment in documents */
.doc-review{border:1px dashed var(--line-2);border-radius:10px;padding:11px 13px;margin-top:10px;background:#fff}
.doc-review .dr-h{font-size:12.5px;font-weight:700;color:var(--gold-2);display:flex;align-items:center;gap:7px;margin-bottom:5px}
.doc-review .dr-by{font-size:12px;color:var(--ink-3);font-weight:600;margin-bottom:3px}
.doc-review .dr-note{font-size:12.5px;color:var(--ink-3);line-height:1.6;min-height:18px;white-space:pre-wrap}
/* badge danger */
.badge.b-danger{background:#FBE6E3;color:#B23A2E;border-color:#F0C6C0}
/* filter bar */
.filter-bar{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.fb-item{display:flex;flex-direction:column;gap:5px}
.fb-item.grow{flex:1;min-width:170px}
.fb-item label{font-size:11px;color:var(--text-2);font-weight:600}
.fb-item select,.fb-item input{padding:8px 11px;border:1px solid var(--line-2);border-radius:8px;font-size:13px;background:#fff;color:var(--ink-3);font-family:inherit}
.fb-actions{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
/* staff directory */
.dept-block{margin-bottom:18px}
.dept-h{font-family:var(--serif);font-size:15px;color:var(--ink-3);font-weight:700;display:flex;align-items:center;gap:9px;padding-bottom:12px;margin-bottom:6px;border-bottom:1px solid var(--line)}
.pyramid{display:flex;flex-direction:column;gap:10px;align-items:center}
.lvl-row{display:flex;align-items:center;width:100%;justify-content:center;position:relative;padding:8px 0 8px 120px}
.lvl-row+.lvl-row::before{content:'';position:absolute;top:-10px;left:50%;width:2px;height:10px;background:var(--line-2)}
.lvl-tag{position:absolute;left:0;top:50%;transform:translateY(-50%);font-size:10.5px;color:var(--gold-2);font-weight:700;text-transform:uppercase;letter-spacing:.03em;width:108px;line-height:1.25}
.lvl-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.emp-card{display:flex;flex-direction:column;align-items:center;gap:6px;width:120px;padding:12px 8px;border:1px solid var(--line-2);border-radius:12px;background:#fff;cursor:pointer;transition:.14s;font-family:inherit}
.emp-card:hover{border-color:var(--gold);box-shadow:0 6px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
.emp-ava{border-radius:50%;box-shadow:0 0 0 3px #fff,0 0 0 4px var(--ac,var(--gold))}
.emp-ava .ava-svg{display:block;border-radius:50%}
.emp-nm{font-size:12px;font-weight:700;color:var(--ink-3);text-align:center;line-height:1.25}
.emp-po{font-size:10.5px;color:var(--text-2);text-align:center;line-height:1.2}
/* profile modal */
.emp-modal{position:fixed;inset:0;z-index:60;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
.emp-modal.show{display:flex}
.emp-modal-inner{background:var(--paper);border:1px solid var(--line-2);border-radius:16px;max-width:680px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.28);overflow:hidden;animation:popIn .18s ease}
@keyframes popIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.emp-modal-head{position:relative;padding:20px 22px;background:linear-gradient(135deg,var(--ink-3),#13433D);color:#fff}
.emp-x{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:8px;border:0;background:rgba(255,255,255,.16);color:#fff;cursor:pointer;display:grid;place-items:center}
.emp-x:hover{background:rgba(255,255,255,.28)}
.emp-x svg{width:16px;height:16px}
.emp-id-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.qr-box{display:flex;flex-direction:column;align-items:center;gap:5px;background:#fff;padding:8px;border-radius:10px}
.qr-box .qr{display:block;width:104px;height:104px;background:#fff}
.qr-cap{font-size:9.5px;color:var(--text-2);text-align:center;max-width:104px;line-height:1.2}
.emp-ava-lg{border-radius:50%;box-shadow:0 0 0 4px rgba(255,255,255,.9)}
.emp-ava-lg .ava-svg{display:block;border-radius:50%}
.emp-meta{flex:1;min-width:160px}
.emp-meta-nm{font-family:var(--serif);font-size:21px;font-weight:700;line-height:1.2}
.emp-meta-po{font-size:14px;color:var(--gold);font-weight:600;margin-top:3px}
.emp-meta-sub{font-size:12px;color:#Bcd6d2;margin-top:6px}
.emp-tabs{display:flex;gap:4px;padding:0 16px;border-bottom:1px solid var(--line);background:#fff;overflow-x:auto}
.etab{padding:13px 14px;border:0;background:none;font-size:12.5px;font-weight:600;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}
.etab.on{color:var(--gold-2);border-bottom-color:var(--gold)}
.emp-body{padding:20px 22px;max-height:52vh;overflow:auto;background:#fff}
.prof-sec{margin-bottom:18px}
.prof-sec h5{font-size:12.5px;font-weight:700;color:var(--ink-3);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.prof-sec h5 svg{width:15px;height:15px;color:var(--gold-2)}
.wk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.wk-card{display:flex;align-items:center;gap:9px;padding:11px 13px;border:1px solid var(--line-2);border-radius:10px;background:var(--paper-3);font-size:12.5px;font-weight:600;color:var(--ink-3)}
.wk-card svg{width:16px;height:16px;color:var(--gold-2);flex:0 0 auto}
.wk-card .wk-l{flex:1;line-height:1.25}
/* contract tracking + expiry alert */
.alert-bar{border:1px solid #F0C6C0;background:linear-gradient(180deg,#FDEEEC,#FCF6F4);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.alert-h{font-size:13px;font-weight:700;color:#B23A2E;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.alert-h svg{width:16px;height:16px}
.alert-list{display:flex;flex-direction:column;gap:7px}
.alert-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line-2);border-radius:9px;background:#fff;cursor:pointer;font-family:inherit;text-align:left;width:100%}
.alert-row:hover{border-color:var(--gold);background:var(--gold-tint)}
.al-nm{font-size:12.5px;font-weight:600;color:var(--ink-3);flex:1;min-width:90px}
.al-end{font-size:11.5px;color:var(--text-2);white-space:nowrap}
.trk-emp{display:flex;align-items:center;gap:9px}
.trk-ava{flex:0 0 auto;border-radius:50%;box-shadow:0 0 0 2px #fff,0 0 0 3px var(--ac,var(--gold))}
.trk-ava .ava-svg{display:block;border-radius:50%}
.trk-sub{font-size:11px;color:var(--text-2)}
.tbl tr.row-warn{background:#FFF7E8}
.tbl tr.row-exp{background:#FDEEEC}
/* duties outline editor */
.duty-editor{border:1px solid var(--line-2);border-radius:10px;padding:12px;background:var(--paper-3)}
#duty-outline{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.duty-row{display:flex;align-items:center;gap:8px}
.duty-row.lv2{padding-left:26px}
.duty-row.lv3{padding-left:52px}
.duty-pf{flex:0 0 auto;min-width:26px;font-weight:700;color:var(--gold-2);font-size:12.5px}
.duty-row.lv1 .duty-pf{font-size:14px;color:var(--ink-3)}

.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:7px}
.ring-lb{font-size:11.5px;color:var(--text-2);font-weight:600;text-align:center}

.task-bar{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}

.seg-btn.on{background:var(--gold);color:#3a2d05}
.task-nav{display:flex;align-items:center;gap:8px;margin-left:auto}
.task-navlb{font-size:12.5px;font-weight:700;color:var(--ink-3);min-width:130px;text-align:center}
.task-add{display:flex;gap:8px;margin-bottom:12px}

.task-list{display:flex;flex-direction:column;gap:8px}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;background:#fff}

.task-item.st-submitted{background:#EEF4F9}
.task-tx{flex:1;font-size:13px;color:var(--ink-3);font-weight:500}
.task-carry{font-size:10.5px;font-weight:700;color:#B23A2E;background:#FBE6E3;border-radius:5px;padding:2px 6px;margin-right:4px}
.task-act{display:flex;align-items:center;gap:6px}
.task-done{color:#1F6F66;display:grid;place-items:center}
.task-done svg{width:18px;height:18px}
.task-del{width:26px;height:26px;border:1px solid var(--line-2);border-radius:6px;background:#fff;color:var(--text-3);cursor:pointer;display:grid;place-items:center}

.task-del svg{width:13px;height:13px}
.task-sub-h{margin:16px 0 8px;font-size:12px;font-weight:700;color:#B23A2E;display:flex;align-items:center;gap:7px}
.task-sub-h svg{width:15px;height:15px}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}

.cal-cell.cal-sel{background:var(--gold-tint)}
.cal-d{font-size:11.5px;font-weight:700;color:var(--ink-3)}
.cal-dots{display:flex;flex-wrap:wrap;gap:3px}

.cd-done{background:#1F6F66}
.cd-sub{background:#2C73A3}
.cd-plan{background:#C9A24B;color:#3a2d05}
.cal-legend{margin-top:12px;font-size:11.5px;color:var(--text-2);display:flex;align-items:center;gap:4px;flex-wrap:wrap}

@media (max-width:760px){

  .seg-btn{flex:1;text-align:center;padding:8px 6px}

  .cal-cell{min-height:50px;padding:4px}

.fbt-out{margin-top:10px}

.fbt-row{display:flex;gap:9px;align-items:flex-start;padding:7px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;font-size:12.5px;background:var(--paper)}
.fbt-ic{flex:0 0 auto;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;background:#B0B0B0;margin-top:1px}

.fbt-err{font-size:11.5px;color:var(--danger);margin-top:3px;line-height:1.55}

.conn-pill::before{content:"";position:absolute;left:9px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:#B0B0B0}
.conn-pill.on{color:#1F7A3D;border-color:#BEE3C8;background:#EAF7EE}
.conn-pill.on::before{background:#2BA84A}
.conn-pill.err{color:#B23A2E;border-color:#F0C9C3;background:#FBEDEA}
.conn-pill.err::before{background:#D64A3A}
.conn-pill.try::before{background:var(--gold-2)}

.login-sub{text-align:center;font-size:12px;color:var(--text-2);margin-bottom:20px}
.login-field{margin-bottom:13px}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px}
.login-field input{width:100%;padding:11px 12px;border:1px solid var(--line-2);border-radius:9px;font-size:14px;color:var(--ink-3);background:var(--paper-3);box-sizing:border-box}
.login-field input:focus{outline:none;border-color:var(--gold-2);box-shadow:0 0 0 3px var(--gold-tint)}
.login-btn{width:100%;margin-top:6px;padding:12px;font-size:15px;justify-content:center}
.login-demo{margin-top:18px;padding-top:16px;border-top:1px dashed var(--line-2)}
.login-demo .dh{font-size:11.5px;color:var(--text-3);text-align:center;margin-bottom:9px}
.login-demo-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.login-demo-btn{font-size:11px;padding:6px 10px;border:1px solid var(--line-2);border-radius:20px;background:var(--paper-3);color:var(--text-2);cursor:pointer;font-family:inherit}
.login-demo-btn:hover{border-color:var(--gold-2);color:var(--ink-3)}

const $ = s => document.querySelector(s);
const kip = n => Number(n).toLocaleString('en-US') + ' ກີບ';
const num = n => Number(n).toLocaleString('en-US');
const today = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function driveId(u){ u=String(u||''); const m = u.match(/\/file\/d\/([-\w]{20,})/) || u.match(/[?&]id=([-\w]{20,})/) || u.match(/googleusercontent\.com\/d\/([-\w]{20,})/) || u.match(/\/d\/([-\w]{20,})/); return m?m[1]:null; }
function imgSrc(v){ v=String(v||'').trim(); if(!v) return ''; if(v.slice(0,5)==='data:') return v; const id=driveId(v); if(id) return 'https://drive.google.com/thumbnail?id='+id+'&sz=w1000'; return v; }
const docNo = (pfx) => `${pfx}-2026-${String(Math.floor(Math.random()*9000)+1000)}`;
function toast(msg, ok=true){
  const t=document.createElement('div'); t.className='toast'+(ok?' ok':'');
  t.innerHTML=ic(ok?'check':'alert')+`<span>${msg}</span>`;
  $('#toasts').appendChild(t); setTimeout(()=>t.remove(),3800);
}
function statusBadge(s){
  const map={'ອະນຸມັດ':'b-success','ມີຜົນ':'b-success','ປະຈຳ':'b-success','ລໍຖ້າ':'b-warn','ກຳລັງທົດລອງ':'b-info','ຕິດຕາມ':'b-warn'};
  return `<span class="badge ${map[s]||'b-mute'}">${s}</span>`;
}

  kpi:{ title:'ຄູ່ມືຕົວຊີ້ວັດຜົນການປະຕິບັດວຽກ (KPI)', tag:'ປະເມີນຜົນ',

    purpose:'ກຳນົດວິທີປະເມີນຜົນທົດລອງວຽກໃຫ້ຖືກຕ້ອງ, ຍຸດຕິທຳ, ມີຫຼັກຖານ ແລະ ໃຊ້ຕັດສິນໃຈ ຮັບເຂົ້າປະຈຳ, ຕໍ່ໄລຍະທົດລອງ ຫຼື ຢຸດການຈ້າງ.',
    types:[['ຄວາມຮູ້ & ທັກສະວິຊາຊີບ','ມີຄວາມຮູ້ຕາມຕຳແໜ່ງຫຼືບໍ່.'],['ຄຸນນະພາບວຽກ','ຖືກຕ້ອງ, ຄົບຖ້ວນ, ທັນເວລາ, ຂໍ້ຜິດພາດໜ້ອຍ.'],['ວິໄນ & ເວລາ','ມາວຽກຕົງເວລາ, ການລາ, ສົ່ງວຽກຕາມກຳນົດ.'],['ພຶດຕິກຳ & ທັດສະນະຄະຕິ','ຄວາມຮັບຜິດຊອບ, ການຮ່ວມມື, ຄວາມພ້ອມຮຽນຮູ້.'],['ການປັບຕົວກັບອົງກອນ','ເຂົ້າກັບທີມ, ການສື່ສານ, ການເຄົາລົບຫົວໜ້າ.']],

    types:[['ລາພັກປະຈຳປີ','ມີສິດຕາມປີ, ຕ້ອງຂໍອະນຸມັດກ່ອນ.'],['ລາປ່ວຍ','ເຈັບປ່ວຍ, ຫຼາຍມື້ຄວນມີໃບແພດ.'],['ລາກິດສ່ວນຕົວ','ວຽກຄອບຄົວ, ເອກະສານລັດ.'],['ລາຄອດ','ສຳລັບພະນັກງານຍິງ ຕາມລະບຽບ & ກົດໝາຍ.'],['ລາບໍ່ຮັບເງິນເດືອນ','ລາເກີນສິດ ຫຼື ເຫດຜົນພິເສດ.'],['ລາສຸກເສີນ','ເຫດດ່ວນ ບໍ່ສາມາດຂໍລ່ວງໜ້າ.']],
    steps:[['ກວດສິດວັນລາ','ກວດວັນລາຄົງເຫຼືອກັບ HR ຫຼື ລະບົບ.'],['ກອກໃບຂໍລາ','ປະເພດ, ວັນທີ, ຈຳນວນມື້, ເຫດຜົນ, ຜູ້ຮັບມອບວຽກແທນ.'],['ສົ່ງໃຫ້ຫົວໜ້າພິຈາລະນາ','ກວດຜົນກະທົບຕໍ່ວຽກ ແລະ ຜູ້ຮັບແທນ.'],['ຂໍອະນຸມັດ','ຫົວໜ້າ/ຜູ້ມີອຳນາດ ລົງນາມ.'],['HR ບັນທຶກວັນລາ','ບັນທຶກເຂົ້າ Leave Register ແລະ ປັບຍອດຄົງເຫຼືອ.'],['ສົ່ງມອບວຽກກ່ອນລາ','ວຽກຄ້າງ, ເອກະສານ, ຂໍ້ມູນລູກຄ້າ.'],['ຕິດຕາມຫຼັງກັບມາ','ຮັບມອບວຽກຄືນ ແລະ ລາຍງານສະຖານະ.'],['ສະຫຼຸບລາຍງານ','ປະຈຳເດືອນ ແຍກຕາມພະແນກ ແລະ ປະເພດການລາ.']],
    forbid:['ລາໂດຍບໍ່ແຈ້ງຫົວໜ້າ','ລາໂດຍບໍ່ມີໃບຂໍ/ບັນທຶກ','ລາເກີນສິດໂດຍບໍ່ອະນຸມັດ','ປອມແປງໃບແພດ','HR ປັບຍອດໂດຍບໍ່ມີເອກະສານ'],
    caution:['ກວດສິດວັນລາກ່ອນອະນຸມັດ','ມີການສົ່ງມອບວຽກກ່ອນລາ','ລາປ່ວຍຫຼາຍມື້ ຄວນມີໃບແພດ','ບັນທຶກການລາໃຫ້ທັນເວລາ','ຮັກສາຂໍ້ມູນການລາເປັນຄວາມລັບ'],

    fieldHelp:{type:['ປະເພດການລາ','ລາພັກປະຈຳປີ ຂໍລ່ວງໜ້າ 3-7 ມື້ · ລາກິດ 1-3 ມື້ · ລາປ່ວຍ ແຈ້ງພາຍໃນມື້ນັ້ນ · ລາສຸກເສີນ ແຈ້ງທັນທີ.','steps']}

  recruit:{ title:'ຄູ່ມືການສຳພາດພະນັກງານເຂົ້າເຮັດວຽກ', tag:'ບຸກຄະລາກອນ',
    purpose:'ກຳນົດຂັ້ນຕອນ ສຳພາດ, ຄັດເລືອກ, ປະເມີນ ແລະ ລາຍງານ ໃຫ້ມີມາດຕະຖານ, ຍຸດຕິທຳ, ໂປ່ງໃສ ແລະ ໄດ້ພະນັກງານທີ່ເໝາະສົມ.',
    types:[['ສຳພາດເບື້ອງຕົ້ນ (HR)','ປະຫວັດ, ຄວາມສົນໃຈ, ເງິນເດືອນຄາດຫວັງ, ວັນເລີ່ມ.'],['ສຳພາດດ້ານວິຊາຊີບ','ຫົວໜ້າພະແນກ ສຳພາດຄວາມຮູ້ສະເພາະຕຳແໜ່ງ.'],['ສຳພາດພຶດຕິກຳ','ຄວາມຮັບຜິດຊອບ, ການແກ້ບັນຫາ, ການເຮັດວຽກເປັນທີມ.'],['ສຳພາດກັບຜູ້ບໍລິຫານ','ສຳລັບຕຳແໜ່ງສຳຄັນ.'],['ສອບທົດສອບກ່ອນຮັບ','Case Study ຕາມຕຳແໜ່ງ.']],
    steps:[['ຮັບ & ຄັດກອງເອກະສານ','CV, ປະສົບການ, ວຸດທິການສຶກສາ, ຄວາມເໝາະສົມ.'],['ນັດໝາຍສຳພາດ','ແຈ້ງ ວັນເວລາ, ສະຖານທີ່, ເອກະສານ, ຮູບແບບ.'],['ສຳພາດຮອບ HR','ຂໍ້ມູນພື້ນຖານ, ເງິນເດືອນຄາດຫວັງ, ວິໄນ.'],['ສຳພາດຮອບວິຊາຊີບ','ຄວາມຮູ້ງານສະເພາະຕຳແໜ່ງ.'],['ທົດສອບວຽກ','ແບບທົດສອບ ຫຼື Case Study.'],['ປະເມີນຄະແນນ','ຄວາມຮູ້ 35% · ປະສົບການ 20% · ສື່ສານ 15% · ທັດສະນະຄະຕິ 15% · ເໝາະກັບທີມ 15%.'],['ສະຫຼຸບຜົນ','ຜ່ານ / ສຳຮອງ / ສຳພາດຮອບຕໍ່ໄປ / ບໍ່ຜ່ານ.'],['ຂໍອະນຸມັດຮັບເຂົ້າ','ຄະແນນ, ຂໍ້ສະເໜີເງິນເດືອນ, ວັນເລີ່ມ.'],['ແຈ້ງຜົນຜູ້ສະໝັກ','ຢ່າງສຸພາບ ແລະ ບັນທຶກ.']],
    forbid:['ຖາມຄຳຖາມລະເມີດສ່ວນຕົວເກີນຈຳເປັນ','ຕັດສິນດ້ວຍຄວາມລຳອຽງ','ຮັບໂດຍບໍ່ມີຫຼັກຖານສຳພາດ','ສັນຍາເງິນເດືອນ/ຕຳແໜ່ງໂດຍບໍ່ອະນຸມັດ','ນຳຂໍ້ມູນຜູ້ສະໝັກໄປໃຊ້ນອກຈຸດປະສົງ'],
    caution:['ກວດເອກະສານກ່ອນສຳພາດ','ມີແບບຟອມໃຫ້ຄະແນນ','ໃຊ້ຄຳຖາມທີ່ກ່ຽວກັບວຽກ','ຈົດບັນທຶກຄຳຕອບສຳຄັນ','ຮັກສາຂໍ້ມູນຜູ້ສະໝັກເປັນຄວາມລັບ'],
    files:['CV/ໃບສະໝັກ','ແບບຟອມປະເມີນສຳພາດ','ແບບທົດສອບ','ໃບອະນຸມັດຮັບເຂົ້າ','Offer Letter'],
    retention:[['CV/ໃບສະໝັກ','2-5 ປີ'],['ແບບຟອມສຳພາດ','5 ປີ'],['ໃບອະນຸມັດຮັບເຂົ້າ','10 ປີ']],

  certificate:{ title:'ຄູ່ມືການອອກໃບຜ່ານງານ', tag:'ບຸກຄະລາກອນ',
    purpose:'ກຳນົດຂັ້ນຕອນອອກໃບຜ່ານງານໃຫ້ຖືກຕ້ອງ, ມີມາດຕະຖານ, ກວດສອບໄດ້ ແລະ ໃຊ້ເປັນຫຼັກຖານຢືນຢັນປະຫວັດການເຮັດວຽກ.',
    types:[['ເມື່ອລາອອກ','ສຳລັບຜູ້ລາອອກ ແລະ ສົ່ງມອບວຽກຄົບ.'],['ເມື່ອສັນຍາສິ້ນສຸດ','ສັນຍາຄົບກຳນົດ ຫຼື ບໍ່ຕໍ່.'],['ໃບຢືນຢັນການເຮັດວຽກ','ສຳລັບຜູ້ຍັງເຮັດວຽກ (ຂໍສິນເຊື່ອ, ວີຊາ, ຢືນຢັນລາຍໄດ້).'],['ສຳລັບຝຶກງານ','ຫຼັງນັກສຶກສາຝຶກຄົບກຳນົດ.'],['ພິເສດ','ລະບຸໜ້າທີ່/ໂຄງການ/ປະສົບການສະເພາະ.']],
    steps:[['ຮັບຄຳຮ້ອງຂໍ','ຈາກພະນັກງານ ຫຼື ຕາມຂັ້ນຕອນອອກວຽກ.'],['ກວດຂໍ້ມູນພະນັກງານ','ຊື່, ຕຳແໜ່ງ, ພະແນກ, ວັນເລີ່ມ-ສິ້ນສຸດ.'],['ກວດສະຖານະການອອກວຽກ','ລາອອກ / ສິ້ນສຸດ / ຍົກເລີກ / ຍັງເຮັດຢູ່.'],['ກວດການສົ່ງມອບ','ວຽກ, ຊັບສິນ, ເອກະສານ ຄົບຖ້ວນ.'],['ຮ່າງໃບຜ່ານງານ','ຊື່ບໍລິສັດ, ເລກທີ, ຕຳແໜ່ງ, ໄລຍະເຮັດວຽກ, ຄຳຢືນຢັນ.'],['ກວດສອບຮ່າງ','HR & ຫົວໜ້າ ກວດຄວາມຖືກຕ້ອງ ແລະ ພາສາ.'],['ຂໍລົງນາມ','ຜູ້ມີອຳນາດ ລົງນາມ ແລະ ປະທັບຕາ.'],['ມອບໃຫ້ພະນັກງານ','ໃຫ້ລົງນາມຮັບເອກະສານ.'],['ບັນທຶກທະບຽນ','ເຂົ້າທະບຽນອອກໃບຜ່ານງານ.']],
    forbid:['ອອກໃບທີ່ຂໍ້ມູນບໍ່ຖືກຕ້ອງ','ລະບຸຂໍ້ມູນເກີນຄວາມຈິງ','ອອກໂດຍບໍ່ກວດປະຫວັດ','ລົງນາມໂດຍຜູ້ບໍ່ມີອຳນາດ','ໃຫ້ສຳເນົາອອກໂດຍບໍ່ບັນທຶກ'],

  internship:{ title:'ຄູ່ມືການຮັບນັກສຶກສາມາຝຶກງານ', tag:'ບຸກຄະລາກອນ',
    purpose:'ກຳນົດຂັ້ນຕອນຮັບນັກສຶກສາຝຶກງານໃຫ້ມີລະບຽບ, ປອດໄພ, ມີຜູ້ຄວບຄຸມ, ມີແຜນຊັດເຈນ ແລະ ໃຫ້ໄດ້ຮຽນຮູ້ວຽກຈິງ.',
    types:[['ຕາມຫຼັກສູດສະຖາບັນ','ສະຖາບັນສົ່ງມາຕາມໄລຍະທີ່ກຳນົດ.'],['ພາກສະໝັກໃຈ','ນັກສຶກສາສະໝັກເຂົ້າມາເອງ.'],['ລະຍະສັ້ນ','1-4 ອາທິດ ເນັ້ນພື້ນຖານ ແລະ ສັງເກດວຽກ.'],['ລະຍະຍາວ','2-6 ເດືອນ ເນັ້ນມອບໝາຍວຽກ ແລະ ສ້າງທັກສະ.'],['ຕາມພະແນກ','ບັນຊີ, ອາກອນ, ກວດສອບ, HR, ການເງິນ, ການຕະຫຼາດ.']],

  discipline:{ title:'ຄູ່ມືການປະຕິບັດວິໄນລະບຽບ', tag:'ວິໄນ',
    purpose:'ກຳນົດຫຼັກເກນ, ຂັ້ນຕອນ ແລະ ເອກະສານໃນການດຳເນີນວິໄນ ໃຫ້ຖືກຕ້ອງ, ຍຸດຕິທຳ, ໂປ່ງໃສ, ມີຫຼັກຖານ ແລະ ປ້ອງກັນຂໍ້ຂັດແຍ່ງ.',
    types:[['ຕັກເຕືອນດ້ວຍວາຈາ','ຄວາມຜິດເບົາ ເຊັ່ນ ມາຊ້າ, ລືມລາຍງານ.'],['ໜັງສືແຈ້ງເຕືອນ ຄັ້ງທີ 1','ເຮັດຜິດຊ້ຳ ຫຼື ມີຜົນກະທົບຕໍ່ວຽກ.'],['ໜັງສືແຈ້ງເຕືອນ ຄັ້ງທີ 2','ຍັງບໍ່ປັບປຸງ ຫຼື ຜິດຊ້ຳຫຼັງເຕືອນ.'],['ພັກວຽກຊົ່ວຄາວ','ຕ້ອງກວດສອບຂໍ້ເທັດຈິງ ຫຼື ຄວາມຜິດຮ້າຍແຮງ.'],['ຕັດສິດບາງຢ່າງ','ບໍ່ໄດ້ Bonus/ປັບເງິນເດືອນ/ເລື່ອນຕຳແໜ່ງ.'],['ຍົກເລີກສັນຍາ','ຄວາມຜິດຮ້າຍແຮງ ຫຼື ບໍ່ປັບປຸງຫຼັງເຕືອນຫຼາຍຄັ້ງ.']],
    steps:[['ພົບເຫັນ & ບັນທຶກເຫດການ','ວັນທີ, ເວລາ, ສະຖານທີ່, ລາຍລະອຽດ, ພະຍານ.'],['ກວດສອບຫຼັກຖານ','Timesheet, CCTV, Email, ເອກະສານ, ພະຍານ.'],['ເຊີນພະນັກງານຊີ້ແຈງ','ບັນທຶກຄຳຊີ້ແຈງເປັນລາຍລັກອັກສອນ.'],['ພິຈາລະນາລະດັບຄວາມຜິດ','ເບົາ / ປານກາງ / ຮ້າຍແຮງ.'],['ສະເໜີມາດຕະການວິໄນ','ຕັກເຕືອນ, ໜັງສືເຕືອນ, ພັກວຽກ ຫຼື ຍົກເລີກຈ້າງ.'],['ຂໍອະນຸມັດ','ບັນທຶກ, ຫຼັກຖານ, ຄຳຊີ້ແຈງ ໃຫ້ຜູ້ມີອຳນາດ.'],['ແຈ້ງຜົນວິໄນ','ລະບຸ ເຫດຜົນ, ຫຼັກຖານ, ມາດຕະການ, ໄລຍະຕິດຕາມ.'],['ໃຫ້ພະນັກງານລົງນາມຮັບຮູ້','ຖ້າບໍ່ລົງນາມ ຕ້ອງມີພະຍານຢືນຢັນ.'],['ຕິດຕາມການປັບປຸງ','ກວດວ່າປັບປຸງ ຫຼື ຍັງຝ່າຝືນຊ້ຳ.'],['ຈັດເກັບເອກະສານ','ເຂົ້າແຟ້ມ HR.']],
    forbid:['ລົງໂທດໂດຍບໍ່ມີຫຼັກຖານ','ໃຊ້ອາລົມ/ຄວາມລຳອຽງ','ເປີດເຜີຍຂໍ້ມູນວິໄນຕໍ່ຜູ້ບໍ່ກ່ຽວຂ້ອງ','ບັງຄັບພະນັກງານລົງນາມ','ຍົກເລີກຈ້າງໂດຍບໍ່ຜ່ານການກວດສອບ'],

/* ============================================================

   ============================================================ */
function a11yPass(){
  const root=$('#main'); if(root){ root.querySelectorAll('.rowlink, .cal-cell[data-task-date]').forEach(el=>{ if(!el.hasAttribute('tabindex')){ el.setAttribute('tabindex','0'); el.setAttribute('role','button'); } }); }
  document.querySelectorAll('button[title]:not([aria-label])').forEach(b=>{ if(!String(b.textContent||'').trim()) b.setAttribute('aria-label', b.getAttribute('title')); });
}
function renderPage(){
  const main = $('#main'); if(!main) return;
  if(state.doc){ main.innerHTML = renderDocView(); main.scrollTop=0; wireCalc(); a11yPass(); return; }
  const map = {
    dashboard:renderDashboard, archive:renderArchive, staff:renderStaff, signatures:renderSignatures, contract:renderContract, recruit:renderRecruit,
    probation:renderProbation, timesheet:renderTimesheet, ot:renderOT,
    leave:renderLeave, bonus:renderBonus, kpi:renderKPI,
    manuals:renderManuals, devdocs:renderDevdocs, settings:renderSettings
  };
  const fn = map[state.page] || renderGenericModule;
  main.innerHTML = fn();
  main.scrollTop = 0;
  wireCalc();
  a11yPass();
}

function field(label, control, o){
  o=o||{};

  const req  = o.req ? '<span class="req">*</span>' : '';
  const hint = o.hint ? `<div class="hint">${o.hint}</div>` : '';
  return `<div class="field"><label>${label} ${req} ${help}</label>${control}${hint}</div>`;
}
function opts(arr, sel){
  return arr.map(o=>{ const v=Array.isArray(o)?o[0]:o; const t=Array.isArray(o)?o[1]:o;
    return `<option value="${v}" ${String(v)===String(sel)?'selected':''}>${t}</option>`; }).join('');
}
function calcStrip(cells){
  return `<div class="calc-strip">${cells.map(c=>
    `<div class="calc-cell ${c.final?'final':''}"><div class="cl">${c.l}</div><div class="cv"${c.id?` id="${c.id}"`:''}>${c.v}</div></div>`
  ).join('')}</div>`;
}

function flowStrip(manualKey, active){
  const m = MANUALS[manualKey]; if(!m||!m.flow) return '';

  ).join(`<span class="flow-arrow">${ic('arrowRight')}</span>`);
  return `<div class="card card-pad" style="margin-top:16px">

   ============================================================ */
function netHours(start,end,brk){
  if(!start||!end) return 0;
  const [sh,sm]=start.split(':').map(Number), [eh,em]=end.split(':').map(Number);
  let mins=(eh*60+em)-(sh*60+sm); if(mins<0) mins+=1440; mins-=(Number(brk)||0);
  return Math.max(0, mins/60);
}

}

/* ============================================================
   MODULE: RECRUIT  (interview scoring + decision)
   ============================================================ */
function renderRecruit(){
  const sample = [
    ['ນາງ ໄພລິນ','ພະນັກງານບັນຊີ','ສຳພາດຜ່ານ','b-success'],
    ['ທ. ອາທິດ','Developer','ສຳຮອງ','b-warn'],
  ].map(r=>`<tr><td class="nm">${r[0]}</td><td>${r[1]}</td><td><span class="badge ${r[3]}">${r[2]}</span></td></tr>`);
  return `<div class="page">
    ${pageHead({eyebrow:'ບຸກຄະລາກອນ', title:'ຮັບສະໝັກ & ສຳພາດ', desc:'ບັນທຶກການສຳພາດ ໃຫ້ຄະແນນແບບຖ່ວງນ້ຳໜັກ ແລະ ສະຫຼຸບມະຕິຄັດເລືອກ ຢ່າງເປັນລະບົບ.'})}
    <div class="doc">
      ${docHead(docNo('REC'),'ໃບບັນທຶກການສຳພາດ & ຄັດເລືອກ','Interview & Selection Record')}
      <div class="doc-body">
        <div class="fieldset">
          ${fsTitle(1,'ຂໍ້ມູນຜູ້ສະໝັກ')}
          <div class="frow c3">
            ${field('ຊື່ຜູ້ສະໝັກ', `<input type="text" placeholder="ຊື່-ສະກຸນ">`, {req:true})}
            ${field('ຕຳແໜ່ງທີ່ສະໝັກ', `<input type="text" placeholder="ເຊັ່ນ Developer">`, {req:true})}
            ${field('ແຫຼ່ງທີ່ມາ', `<select>${opts(['ເວັບໄຊ/ປະກາດ','ແນະນຳໂດຍພະນັກງານ','ໂຊຊຽວມີເດຍ','ສະຖາບັນການສຶກສາ','ອື່ນໆ'])}</select>`, {})}
          </div>
          <div class="frow">
            ${field('ວັນສຳພາດ', `<input type="date" value="${today()}">`, {req:true})}
            ${field('ຄະນະກຳມະການສຳພາດ', `<input type="text" placeholder="ຊື່ກຳມະການ">`, {})}
          </div>
        </div>
        <div class="fieldset">
          ${fsTitle(2,'ໃຫ້ຄະແນນການສຳພາດ (ຖ່ວງນ້ຳໜັກ)')}
          ${scoreTable('rc-score', RC_CRIT)}
          <div style="margin-top:14px">${calcStrip([
            {l:'ຄະແນນລວມ (ຖ່ວງນ້ຳໜັກ)', v:'—', id:'rc-total'},
            {l:'ລະດັບ', v:'—', id:'rc-grade', final:true},
          ])}</div>
        </div>
        <div class="fieldset">
          ${fsTitle(3,'ມະຕິຄັດເລືອກ')}
          ${radioGroup('rc-out',[['pass','ຜ່ານ — ສະເໜີຈ້າງ'],['standby','ສຳຮອງ'],['retest','ນັດສຳພາດຮອບຕໍ່ໄປ'],['fail','ບໍ່ຜ່ານ']])}
        </div>
        ${reviewBlock()}
        ${signBlock()}
        ${stampNote('ຜົນການຄັດເລືອກໃຊ້ປະກອບການສະເໜີຈ້າງ ແລະ ຈັດທຳສັນຍາຕາມຂັ້ນຕອນ.')}
      </div>
      ${formFoot('ບັນທຶກຜົນສຳພາດ ແລະ ດຳເນີນຂັ້ນຕອນສະເໜີຈ້າງ.')}
    </div>
    ${recordsTable(4,'ບັນທຶກການສຳພາດທີ່ຈັດເກັບ (ກົດເພື່ອເປີດເອກະສານ)','recruit','ຍັງບໍ່ມີບັນທຶກການສຳພາດໃນຄັງ')}
    ${relatedLinks('recruit')}
    ${flowStrip('recruit',3)}
  </div>`;
}

function deleteDoc(id){ const i=SAVED.findIndex(d=>d.id===id); if(i<0) return;
  if(typeof confirm==='function' && !confirm('ຢືນຢັນການລຶບເອກະສານນີ້? ບໍ່ສາມາດກູ້ຄືນໄດ້.')) return;
  if(Store.online && Store.remove){ try{ const p=Store.remove(id); if(p&&p.catch) p.catch(e=>toast('ລຶບຈາກ cloud ບໍ່ສຳເລັດ: '+((e&&(e.code||e.message))||'error'),false)); }catch(e){} }
  SAVED.splice(i,1); Store.persist(); state.doc=null; toast('ລຶບເອກະສານແລ້ວ', true); go('archive'); }
function exportBackup(){ const data={ app:'HRMS', version:3, exportedAt:new Date().toISOString(), savedDocs:SAVED, signatures:SIGNATURES, tasks:TASKS };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='hrms_backup_'+today()+'.json'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast('ດາວໂຫລດ backup ສຳເລັດ', true); }
function importBackup(file){ if(!file) return; const r=new FileReader();
  r.onload=ev=>{ try{ const d=JSON.parse(String(ev.target.result));
    if(Array.isArray(d.savedDocs)){ SAVED.length=0; d.savedDocs.forEach(x=>SAVED.push(x)); Store.persist(); if(Store.online&&Store.add){ SAVED.forEach(x=>{ try{ const p=Store.add(x); if(p&&p.catch) p.catch(()=>{}); }catch(e){} }); } }
    if(Array.isArray(d.signatures)){ SIGNATURES.length=0; d.signatures.forEach(x=>SIGNATURES.push(x)); sigPersist(); }
    if(Array.isArray(d.tasks)){ TASKS.length=0; d.tasks.forEach(x=>TASKS.push(x)); taskPersist(); }
    toast('ກູ້ຄືນຂໍ້ມູນສຳເລັດ', true); renderShell();
  }catch(e){ toast('ໄຟລ໌ backup ບໍ່ຖືກຕ້ອງ', false); } };
  r.readAsText(file); }
/* ---- company profile persistence (fixes: edits now apply everywhere & survive reload) ---- */
const CO_KEY = 'hrms_company_v3';
const FB_KEY = 'hrms_fb_config_v2';
function persistCompany(){ try{ if(typeof localStorage!=='undefined') localStorage.setItem(CO_KEY, JSON.stringify(company)); }catch(e){} }
function loadCompany(){ try{ if(typeof localStorage!=='undefined'){ const raw=localStorage.getItem(CO_KEY); if(raw) Object.assign(company, JSON.parse(raw)); } }catch(e){} }
function saveCompany(){
  const clean=s=>String(s||'').replace(/[<>]/g,'').trim();
  const get=k=>{ const el=document.querySelector('[data-company="'+k+'"]'); return el?clean(el.value):''; };
  if(get('name')) company.name=get('name');
  company.nameEn=get('nameEn');
  if(get('seal')) company.seal=get('seal');
  company.addr=get('addr');
  const tel=get('tel'); if(tel) company.tel='ໂທ: '+tel;
  const tax=get('taxId'); if(tax) company.taxId='ເລກປະຈຳຕົວຜູ້ເສຍອາກອນ: '+tax;
  persistCompany();
  toast('ບັນທຶກຂໍ້ມູນບໍລິສັດ ແລະ ນຳໃຊ້ກັບທຸກເອກະສານແລ້ວ', true);
  renderShell();
}
/* ---- Firebase config (entered from Settings) ---- */
function getFbConfig(){ try{ if(typeof localStorage!=='undefined'){ const raw=localStorage.getItem(FB_KEY); if(raw) return JSON.parse(raw); } }catch(e){} return FIREBASE_CONFIG; }
function connectFirebase(){
  const g=id=>{ const el=$('#'+id); return el?el.value.trim():''; };
  const cfg={ apiKey:g('fbc-apiKey'), authDomain:g('fbc-authDomain'), projectId:g('fbc-projectId'), storageBucket:g('fbc-storageBucket'), messagingSenderId:g('fbc-messagingSenderId'), appId:g('fbc-appId') };
  const meas=g('fbc-measurementId'); if(meas) cfg.measurementId=meas;
  if(!cfg.authDomain && cfg.projectId) cfg.authDomain=cfg.projectId+'.firebaseapp.com';
  if(!cfg.apiKey || !cfg.projectId || !cfg.appId){ toast('ຕ້ອງໃສ່ຢ່າງໜ້ອຍ: apiKey, projectId ແລະ appId', false); return; }
  try{ if(typeof localStorage!=='undefined') localStorage.setItem(FB_KEY, JSON.stringify(cfg)); }catch(e){}
  toast('ບັນທຶກ config ໃໝ່ແລ້ວ — ກຳລັງໂຫຼດຄືນເພື່ອນຳໃຊ້ຖານຂໍ້ມູນໃໝ່...', true);

  s=step('ທົດສອບ ອ່ານ (read) ຄືນ');

/* ============================================================
   E-MANUAL DRAWER (slide-in, per-module manual)
   ============================================================ */
const MAN_TABS = [['overview','ພາບລວມ'],['steps','ຂັ້ນຕອນ'],['rules','ຂໍ້ກຳນົດ'],['files','ເອກະສານ'],['flow','ຜັງງານ']];
function manSec(n,title,inner){ return `<div class="man-sec"><h4><span class="mn">${n}</span> ${title}</h4>${inner}</div>`; }
function manList(arr){ return `<ul class="man-list">${arr.map(x=>`<li>${x}</li>`).join('')}</ul>`; }
function drawerBody(m){
  const t = state.manualTab, none='<p style="color:var(--text-3)">— ບໍ່ມີຂໍ້ມູນໃນສ່ວນນີ້ —</p>';
  if(t==='overview'){
    let h = manSec('1','ຈຸດປະສົງ', `<p>${m.purpose||''}</p>`);
    if(m.types && m.types.length) h += manSec('2','ປະເພດ / ກໍລະນີ', manList(m.types.map(x=>`<b style="color:var(--ink-3)">${x[0]}</b> — ${x[1]}`)));
    return h;
  }
  if(t==='steps'){
    let h='';
    if(m.steps && m.steps.length) h += `<div class="man-sec"><h4><span class="mn">✓</span> ຂັ້ນຕອນການປະຕິບັດ</h4><ol class="man-steps">${m.steps.map(s=>`<li><b>${s[0]}</b>${s[1]?' — '+s[1]:''}</li>`).join('')}</ol></div>`;
    if(m.formula) h += `<div class="callout co-info"><b>ສູດຄິດໄລ່</b>${m.formula}</div>`;
    return h || none;
  }
  if(t==='rules'){
    let h='';
    if(m.forbid && m.forbid.length) h += `<div class="callout co-danger"><b>ຂໍ້ຫ້າມ</b>${manList(m.forbid)}</div>`;
    if(m.caution && m.caution.length) h += `<div class="callout co-warn"><b>ຂໍ້ຄວນລະວັງ</b>${manList(m.caution)}</div>`;
    return h || none;
  }
  if(t==='files'){
    let h='';
    if(m.files && m.files.length) h += manSec('1','ເອກະສານທີ່ກ່ຽວຂ້ອງ', manList(m.files));
    if(m.retention && m.retention.length) h += manSec('2','ໄລຍະຈັດເກັບເອກະສານ', `<table class="retain-tbl"><thead><tr><th>ເອກະສານ</th><th>ໄລຍະຈັດເກັບ</th></tr></thead><tbody>${m.retention.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</tbody></table>`);
    if(m.folder) h += manSec('3','ໂຄງສ້າງແຟ້ມດິຈິຕອລ (E-Filing)', `<div class="efile">${m.folder}</div>`);
    return h || none;
  }
  if(t==='flow'){
    if(!m.flow || !m.flow.length) return none;
    const steps = m.flow.map((s,i)=>`<div class="flow-step"><span class="n">${i+1}</span>${s}</div>`).join(`<span class="flow-arrow">${ic('arrowRight')}</span>`);
    return manSec('↪','ຜັງການເຮັດວຽກ', `<div class="flow">${steps}</div>`);
  }
  return none;
}
function drawerHTML(m){
  const tabs = MAN_TABS.map(t=>`<button class="drawer-tab ${state.manualTab===t[0]?'on':''}" data-tab="${t[0]}">${t[1]}</button>`).join('');
  const nSteps=(m.steps&&m.steps.length)||0, nFiles=(m.files&&m.files.length)||0;
  return `<div class="drawer-head">
      <button class="drawer-close" data-drawer-close aria-label="ປິດ">${ic('x')}</button>
      <div class="kicker">${ic('book')} ຄູ່ມືການເຮັດວຽກ · ${m.tag||''}</div>
      <h3>${m.title||''}</h3>
      <div class="meta"><span>${ic('check')} ${nSteps} ຂັ້ນຕອນ</span><span>${ic('doc')} ${nFiles} ເອກະສານ</span></div>
    </div>
    <div class="drawer-tabs">${tabs}</div>
    <div class="drawer-body scroll">${drawerBody(m)}</div>`;
}
function openDrawer(key, anchor){
  const m = MANUALS[key]; if(!m) return;
  let tab = anchor || 'overview';
  if(tab==='formula') tab='steps';
  if(!MAN_TABS.some(t=>t[0]===tab)) tab='overview';
  state.drawer=true; state.manualKey=key; state.manualTab=tab;
  const d=$('#drawer'); d.innerHTML=drawerHTML(m);
  $('#overlay').classList.add('show'); d.classList.add('show'); d.scrollTop=0;
}
function closeDrawer(){ state.drawer=false; const d=$('#drawer'); if(d)d.classList.remove('show'); const o=$('#overlay'); if(o)o.classList.remove('show'); }
function setManualTab(tab){ state.manualTab=tab; const m=MANUALS[state.manualKey]; if(m)$('#drawer').innerHTML=drawerHTML(m); }

/* ============================================================
   INLINE HELP POPOVER (ⓘ on form fields)
   ============================================================ */
function showPop(btn){
  const key=btn.dataset.help, anchor=btn.dataset.anchor||'overview';
  const m=MANUALS[key]; if(!m) return;
  let body='';
  const fh = m.fieldHelp && m.fieldHelp[anchor];
  if(fh) body=fh;
  else if(anchor==='formula' && m.formula) body=m.formula;
  else if(anchor==='rules'){ body=(m.caution&&m.caution[0])||(m.forbid&&m.forbid[0])||(m.purpose||'').slice(0,150); }
  else if(anchor==='steps' && m.steps && m.steps.length){ const s=m.steps[0]; body='<b>'+s[0]+'</b>'+(s[1]?' — '+s[1]:''); }
  else body=(m.purpose||'').slice(0,160);
  const pop=$('#pop');
  pop.innerHTML = `<div class="pt">${ic('book')} ${m.title||''}</div><div>${body}</div>
    <div class="pl" data-pop-open="${key}" data-pop-anchor="${anchor}">${ic('arrowRight')} ອ່ານຄູ່ມືເຕັມ</div>`;
  pop.classList.add('show');
  const r=btn.getBoundingClientRect(), pr=pop.getBoundingClientRect();
  let left=r.left-6, top=r.bottom+10;
  if(left+pr.width > window.innerWidth-12) left=window.innerWidth-pr.width-12;
  if(left<12) left=12;
  if(top+pr.height > window.innerHeight-12) top=r.top-pr.height-10;
  pop.style.left=left+'px'; pop.style.top=top+'px';
}
function hidePop(){ const p=$('#pop'); if(p)p.classList.remove('show'); }

/* ============================================================
   LIVE CALCULATORS (wired after each page render)
   ============================================================ */
function fmt(n){ return Math.round(n).toLocaleString('en-US'); }
function wireCalc(){
  if($('#ts-net')) wireTimesheet();
  if($('#ot-amount')) wireOT();
  if($('#lv-days')) wireLeave();
  if($('#bn-final')) wireBonus();
  if($('#kpi-total')) wireScore('kpi-score','kpi-total','kpi-grade');
  if($('#pb-total')) wireScore('pb-score','pb-total','pb-grade');
  if($('#rc-total')) wireScore('rc-score','rc-total','rc-grade');
  if($('#ct-photo')) wirePhoto();
}
function wireTimesheet(){
  const s=$('#ts-start'),e=$('#ts-end'),b=$('#ts-brk');
  const f=()=>{ const brk=Number(b.value)||0; let g=0;
    if(s.value&&e.value){ const [sh,sm]=s.value.split(':').map(Number),[eh,em]=e.value.split(':').map(Number); let mm=(eh*60+em)-(sh*60+sm); if(mm<0)mm+=1440; g=mm/60; }
    const net=Math.max(0,g-brk/60);
    $('#ts-gross').textContent=g.toFixed(2)+' ຊມ';
    $('#ts-brkout').textContent='−'+(brk/60).toFixed(2)+' ຊມ';
    $('#ts-net').textContent=net.toFixed(2)+' ຊມ'; };
  [s,e,b].forEach(x=>x.addEventListener('input',f)); f();
}
function wireOT(){
  const sal=$('#ot-salary'),hrs=$('#ot-hrs'),rate=$('#ot-rate');
  const f=()=>{ const per=(Number(sal.value)||0)/26/8, r=Number(rate.value)||1, h=Number(hrs.value)||0;
    $('#ot-perhr').textContent=fmt(per)+' ກີບ';
    $('#ot-mult').textContent=h+' ຊມ × '+r;
    $('#ot-amount').textContent=fmt(per*h*r)+' ກີບ'; };
  [sal,hrs,rate].forEach(x=>{x.addEventListener('input',f);x.addEventListener('change',f);}); f();
}
function wireLeave(){
  const fr=$('#lv-from'),to=$('#lv-to'),ty=$('#lv-type');
  const bal={annual:DB.leaveBalance.annual,sick:DB.leaveBalance.sick,personal:DB.leaveBalance.personal};
  const f=()=>{ const d=daysBetween(fr.value,to.value); $('#lv-days').textContent=d+' ມື້';
    const b=bal[ty.value];
    $('#lv-remain').textContent = b ? Math.max(0,b.total-b.used-d)+' / '+b.total+' ມື້' : 'ບໍ່ຈຳກັດ';
    const al=$('#lv-allremain'); if(al){ const a=bal.annual,s=bal.sick,p=bal.personal;
      al.textContent='ປະຈຳປີ '+(a.total-a.used)+' · ປ່ວຍ '+(s.total-s.used)+' · ກິດ '+(p.total-p.used)+' ມື້'; } };
  [fr,to,ty].forEach(x=>{x.addEventListener('input',f);x.addEventListener('change',f);}); f();
}
function wireBonus(){
  const sal=$('#bn-salary'),mo=$('#bn-months'),kp=$('#bn-kpi'),te=$('#bn-tenure');
  const f=()=>{ const base=(Number(sal.value)||0)*(Number(mo.value)||0), k=(Number(kp.value)||0)/100, r=Number(te.value)||1;
    $('#bn-base').textContent=fmt(base)+' ກີບ';
    $('#bn-kpiadj').textContent='× '+k.toFixed(2)+' × '+r;
    $('#bn-final').textContent=fmt(base*k*r)+' ກີບ'; };
  [sal,mo,kp].forEach(x=>x.addEventListener('input',f)); te.addEventListener('change',f); f();
}
function wireScore(cls,totalId,gradeId){
  const inp=[...document.querySelectorAll('.'+cls)];
  const f=()=>{ let tot=0; inp.forEach(i=>{ tot+=(Number(i.value)||0)*(Number(i.dataset.weight)||0)/100; });
    tot=Math.round(tot*10)/10;
    $('#'+totalId).textContent=tot.toFixed(1);
    $('#'+gradeId).textContent=kpiGrade(tot); };
  inp.forEach(i=>i.addEventListener('input',f)); f();
}

/* ============================================================
   NAVIGATION + ACTIONS + EVENT DELEGATION
   ============================================================ */
function go(page){
  if(!availableModules().some(m=>m.key===page)) page='dashboard';
  state.page=page; state.doc=null; state.docEdit=false; state.staffForm=null; closeDrawer(); hidePop(); renderShell();
}
function setRole(role){
  if(!ROLES[role]) return;
  state.role=role; state.doc=null;
  if(!availableModules().some(m=>m.key===state.page)) state.page='dashboard';
  closeDrawer(); hidePop(); renderShell();
}
function approve(no, ok){
  const rec = DB.ot.find(o=>o.no===no) || DB.leave.find(l=>l.no===no);
  if(rec){ rec.status = ok?'ອະນຸມັດ':'ປະຕິເສດ'; toast((ok?'ອະນຸມັດ ':'ປະຕິເສດ ')+no+(ok?' ສຳເລັດ':''), ok); }
  renderShell();
}
document.addEventListener('click', e=>{
  const t = e.target.closest('[data-nav],[data-role],[data-menu],[data-open-manual],[data-help],[data-drawer-close],[data-tab],[data-pop-open],[data-approve],[data-reject],[data-submit],[data-view-doc],[data-back],[data-print],[data-download],[data-emp],[data-emp-close],[data-emp-tab],[data-export],[data-print-table],[data-export-staff],[data-arc-export],[data-arc-print],[data-duty-add],[data-duty-del],[data-sign-pick],[data-sign-clear],[data-sig-save],[data-sig-del],[data-sig-choose],[data-sigpick-close],[data-task-view],[data-task-add],[data-task-submit],[data-task-approve],[data-task-del],[data-task-date],[data-task-nav],[data-doc-del],[data-backup-export],[data-save-company],[data-fb-connect],[data-fb-disconnect],[data-login],[data-logout],[data-login-demo],[data-fb-status],[data-doc-edit],[data-doc-save-edit],[data-doc-edit-cancel],[data-wipe-docs],[data-fb-test],[data-emp-add],[data-emp-save],[data-emp-cancel],[data-emp-edit],[data-emp-del]');
  if(!t) return;
  const d=t.dataset;
  if(d.nav!=null) go(d.nav);
  else if(d.role!=null) setRole(d.role);
  else if(d.menu!=null){ const sb=$('#sidebar'); if(sb) sb.classList.toggle('show'); }
  else if(d.openManual!=null) openDrawer(d.openManual);
  else if(d.help!=null){ e.stopPropagation(); showPop(t); }
  else if(d.drawerClose!=null) closeDrawer();
  else if(d.tab!=null) setManualTab(d.tab);
  else if(d.popOpen!=null){ openDrawer(d.popOpen, d.popAnchor); hidePop(); }
  else if(d.approve!=null) approve(d.approve, true);
  else if(d.reject!=null) approve(d.reject, false);
  else if(d.viewDoc!=null) viewDoc(d.viewDoc);
  else if(d.back!=null){ state.doc=null; go(d.back); }
  else if(d.print!=null) window.print();
  else if(d.download!=null) downloadDoc(d.download);
  else if(d.emp!=null) openEmp(d.emp);
  else if(d.empClose!=null) closeEmp();

   DATA LAYER — persistence (local + cross-tab realtime) and
   optional Firebase Firestore for true online realtime sync.
   To enable cloud realtime across devices: paste your Firebase

const FIREBASE_CONFIG = {

  measurementId: "G-8F3QJTCYKH"
};
const DB_KEY = 'hrms_documents_v3';
const Store = {
  online:false, add:null, remove:null, _error:null, _ready:false, _unsub:null, _trying:false, _db:null, _col:null, addEmp:null, removeEmp:null, _eunsub:null,
  load(){ try{ if(typeof localStorage!=='undefined'){ const raw=localStorage.getItem(DB_KEY);
      if(raw){ const arr=JSON.parse(raw); if(Array.isArray(arr)){ SAVED.length=0; arr.forEach(d=>SAVED.push(d));
        let mx=1000; SAVED.forEach(d=>{ const n=parseInt(String(d.id).replace(/\D/g,''),10); if(n>mx) mx=n; }); DOC_SEQ=mx; return true; } } } }catch(e){} return false; },
  persist(){ try{ if(typeof localStorage!=='undefined'){ localStorage.setItem(DB_KEY, JSON.stringify(SAVED)); } }catch(e){} },
  save(rec){ this.persist(); if(this.online && this.add){ try{ const p=this.add(rec); if(p&&p.catch) p.catch(e=>{ this._error=(e&&(e.code||e.message))||'error'; toast('ບັນທຶກຂຶ້ນ cloud ບໍ່ສຳເລັດ: '+this._error+' — ກວດ Rules', false); }); }catch(e){ this._error=e&&e.message; } } }
};
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.async=true; s.onload=()=>res(); s.onerror=()=>rej(new Error('ໂຫລດ SDK ບໍ່ໄດ້ (ກວດອິນເຕີເນັດ/CSP): '+src)); document.head.appendChild(s); }); }
function fbClean(rec){ try{ return JSON.parse(JSON.stringify(rec)); }catch(e){ return rec; } }
function withTimeout(p, ms, msg){ return Promise.race([ p, new Promise((_,rej)=>setTimeout(()=>rej(new Error(msg)), ms)) ]); }
let _fbApp=null;
async function initOnline(){
  const cfg = getFbConfig();
  if(!cfg || typeof window==='undefined' || typeof document==='undefined') return false;
  Store._trying=true; Store._ready=false; Store._error=null;
  const safety = setTimeout(()=>{ if(!Store._ready){ Store._trying=false; Store.online=false; if(!Store._error) Store._error='ໝົດເວລາລໍຖ້າ Firestore (12 ວິ) — ອາດຍ້ອນ network, API key ຖືກຈຳກັດ (referrer), ຫຼື App Check. ກົດ “ທົດສອບການເຊື່ອມຕໍ່”.'; if(typeof renderShell==='function') renderShell(); } }, 12000);
  try{
    if(!(window.firebase && window.firebase.firestore)){
      await withTimeout(loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js'), 12000, 'ໂຫລດ Firebase SDK ຊ້າ/ຖືກບລັອກ (ກວດ network/CSP)');
      await withTimeout(loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'), 12000, 'ໂຫລດ Firebase SDK ຊ້າ/ຖືກບລັອກ (ກວດ network/CSP)');
    }
    if(!window.firebase) throw new Error('Firebase SDK ບໍ່ພ້ອມ');
    _fbApp = (window.firebase.apps && window.firebase.apps.length) ? window.firebase.app() : window.firebase.initializeApp(cfg);
    const db = window.firebase.firestore();
    const col = db.collection('hrms_documents');
    Store._db = db; Store._col = col;
    Store.add = (rec)=> col.doc(String(rec.id)).set(fbClean(rec));
    Store.remove = (id)=> col.doc(String(id)).delete();
    /* one-time seed: if cloud is empty but we have local docs, push them up */
    try{ const chk = await withTimeout(col.limit(1).get(), 10000, 'get timeout'); if(chk.empty && SAVED.length){ for(const rec of SAVED){ try{ await col.doc(String(rec.id)).set(fbClean(rec)); }catch(e){} } } }catch(e){}
    if(Store._unsub){ try{ Store._unsub(); }catch(e){} }
    Store._unsub = col.onSnapshot(snap=>{
      const arr=[]; snap.forEach(doc=>{ const d=doc.data(); d._fid=doc.id; arr.push(d); });
      arr.sort((a,b)=> String(a.docNo||'').localeCompare(String(b.docNo||'')));
      SAVED.length=0; arr.forEach(d=>SAVED.push(d));
      let mx=1000; SAVED.forEach(d=>{ const n=parseInt(String(d.id).replace(/\D/g,''),10); if(n>mx) mx=n; }); if(mx>DOC_SEQ) DOC_SEQ=mx;
      clearTimeout(safety); Store.persist(); Store.online=true; Store._ready=true; Store._trying=false; Store._error=null;
      if(typeof renderShell==='function') renderShell();
    }, err=>{ clearTimeout(safety); Store.online=false; Store._ready=false; Store._trying=false; Store._error=(err&&(err.code||err.message))||'snapshot error'; if(typeof console!=='undefined') console.warn('snapshot error', err); toast('Firestore ຜິດພາດ: '+Store._error+' — ກວດ Rules/API key', false); if(typeof renderShell==='function') renderShell(); });
    /* employees collection realtime sync */
    const ecol = db.collection('hrms_employees');
    Store.addEmp = (e)=> ecol.doc(String(e.id)).set(fbClean(e));
    Store.removeEmp = (id)=> ecol.doc(String(id)).delete();
    try{ const ec = await withTimeout(ecol.limit(1).get(), 10000, 'get timeout'); if(ec.empty && DB.employees.length){ for(const e of DB.employees){ try{ await ecol.doc(String(e.id)).set(fbClean(e)); }catch(err){} } } }catch(e){}
    if(Store._eunsub){ try{ Store._eunsub(); }catch(e){} }
    Store._eunsub = ecol.onSnapshot(snap=>{ const arr=[]; snap.forEach(d=>{ const o=d.data(); arr.push(o); }); DB.employees.length=0; arr.forEach(o=>DB.employees.push(o)); persistEmployees(); if(typeof renderShell==='function') renderShell(); }, err=>{ if(typeof console!=='undefined') console.warn('emp snapshot error', err); });
    Store.online = true;
    return true;
  }catch(e){ clearTimeout(safety); Store.online=false; Store._ready=false; Store._trying=false; Store._error=(e&&e.message)||String(e); if(typeof console!=='undefined') console.warn('online init failed:', e); if(typeof renderShell==='function') renderShell(); return false; }
}

  const review = rec.review && (rec.review.name||rec.review.note) ? `<div class="doc-review"><div class="dr-h">${ic('shield')} ຄຳຄິດເຫັນ ຫົວໜ້າພະແນກ / ຜູ້ຄວບຄຸມ</div><div class="dr-by">${escapeHtml(rec.review.name||'—')}${rec.review.pos?' · '+escapeHtml(rec.review.pos):''}</div><div class="dr-note">${escapeHtml(rec.review.note||'—')}</div></div>` : '';

}

function saveDocEdit(){
  const rec = SAVED.find(d=>d.id===state.doc); if(!rec) return;
  const doc = document.querySelector('#print-area'); if(!doc) return;
  const gv=sel=>{ const el=doc.querySelector(sel); return el?el.value:undefined; };
  ['docType','name','date','status'].forEach(k=>{ const v=gv('[data-edit-top="'+k+'"]'); if(v!==undefined) rec[k]=v; });
  (rec.sections||[]).forEach((s,si)=>{ (s.rows||[]).forEach((r,ri)=>{ if(s.kind==='duties'){ const v=gv('[data-edit="s'+si+'r'+ri+'c2"]'); if(v!==undefined) r[2]=v; } else { const v=gv('[data-edit="s'+si+'r'+ri+'c1"]'); if(v!==undefined) r[1]=v; } }); });
  if(rec.calc) rec.calc.forEach((r,ci)=>{ const v=gv('[data-edit-calc="'+ci+'"]'); if(v!==undefined) r[1]=v; });
  const oc=doc.querySelector('[data-edit-outcome]'); if(oc) rec.outcome=oc.value;
  if(rec.review){ const rn=gv('[data-edit-review-name]'); if(rn!==undefined) rec.review.name=rn; const nt=doc.querySelector('[data-edit-review-note]'); if(nt) rec.review.note=nt.value; }
  Store.save(rec); state.docEdit=false; toast('ບັນທຶກການແກ້ໄຂແລ້ວ', true); renderShell();
}
